<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>算数シューティングバトル</title>
  <style>
    :root{
      --bg:#0b1020; --text:#f4f7ff; --muted:#b8c4e6; --good:#59d98e; --bad:#ff7676; --warn:#ffd166; --accent:#73b7ff;
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
    html,body{margin:0; padding:0; width:100%; height:100%; background:linear-gradient(180deg,#09101d 0%, #0e1730 100%); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif; overflow:hidden;}
    #app{width:100vw; height:100vh; display:flex; flex-direction:column;}
    .topbar{flex:0 0 auto; display:grid; grid-template-columns: 1.2fr 1fr 1fr 0.8fr; gap:8px; padding:10px 10px 6px; background:rgba(4,8,18,.35); backdrop-filter: blur(8px); border-bottom:1px solid rgba(255,255,255,.08);}
    .card{background:linear-gradient(180deg, rgba(26,35,68,.92), rgba(16,22,43,.92)); border:1px solid rgba(115,183,255,.18); border-radius:14px; padding:8px 10px; min-height:54px; box-shadow: 0 8px 22px rgba(0,0,0,.18);}
    .label{font-size:11px; color:var(--muted); margin-bottom:4px;}
    .value{font-size:18px; font-weight:700;}
    .hearts{letter-spacing:1px;}
    .layout{flex:1 1 auto; display:grid; grid-template-columns: 1.3fr 0.9fr; gap:10px; padding:10px; min-height:0;}
    .game-panel{position:relative; overflow:hidden; border-radius:18px; border:1px solid rgba(255,255,255,.08); background:radial-gradient(circle at 50% 10%, rgba(115,183,255,.18), transparent 30%), linear-gradient(180deg, #101832 0%, #0c1326 60%, #0a1020 100%); min-height:0;}
    canvas{ width:100%; height:100%; display:block; touch-action:none; }
    .quiz-panel{display:flex; flex-direction:column; gap:10px; min-height:0;}
    .question-box,.message{background:linear-gradient(180deg, rgba(28,39,75,.95), rgba(18,25,46,.95)); border:1px solid rgba(255,255,255,.08); border-radius:18px; padding:14px; box-shadow: 0 8px 22px rgba(0,0,0,.18);}
    .unit{font-size:12px; color:var(--warn); margin-bottom:6px; font-weight:700;}
    .question{font-size:22px; line-height:1.35; font-weight:800; margin-bottom:10px;}
    .sub,.message{font-size:15px; color:var(--muted);}
    .choices{display:grid; grid-template-columns:1fr; gap:8px;}
    .choice{border:1px solid rgba(115,183,255,.18); background:linear-gradient(180deg, rgba(23,32,60,.95), rgba(15,21,39,.95)); color:var(--text); border-radius:14px; padding:12px 14px; font-size:18px; font-weight:700; text-align:left;}
    .choice:disabled{ opacity:.62; }
    .choice.good{ border-color:rgba(89,217,142,.7); box-shadow: inset 0 0 0 1px rgba(89,217,142,.32);}
    .choice.bad{ border-color:rgba(255,118,118,.7); box-shadow: inset 0 0 0 1px rgba(255,118,118,.32);}
    .controls{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    .bigbtn{border:none; border-radius:16px; padding:14px; font-size:18px; font-weight:800; color:var(--text); background:linear-gradient(180deg, #26427e, #1d3360); box-shadow:0 10px 20px rgba(0,0,0,.2);}
    .bigbtn.secondary{ background:linear-gradient(180deg, #4c5a7b, #37425d);}
    .overlay{position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:rgba(5,10,20,.76); padding:18px;}
    .overlay.show{display:flex;}
    .modal{width:min(680px, 100%); background:linear-gradient(180deg,#1a2442,#11182d); border:1px solid rgba(255,255,255,.12); border-radius:24px; padding:22px; box-shadow:0 24px 70px rgba(0,0,0,.45);}
    .modal h1{font-size:30px; margin:0 0 10px;}
    .modal p{color:var(--muted); line-height:1.6;}
    .stats{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:14px 0;}
    .stat{background:rgba(255,255,255,.04); border-radius:16px; padding:12px;}
    .miss-list{max-height:180px; overflow:auto; margin-top:10px; font-size:14px;}
    .miss-item{padding:8px 0; border-top:1px solid rgba(255,255,255,.08);}
    @media (max-width: 980px){ .layout{grid-template-columns:1fr;} .question{font-size:20px;} .topbar{grid-template-columns:1fr 1fr;} }
  </style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="card"><div class="label">プレイヤーHP</div><div class="value hearts" id="playerHpText">♥♥♥♥♥</div></div>
    <div class="card"><div class="label">ボスHP</div><div class="value hearts" id="bossHpText">♥♥♥♥♥♥♥♥♥♥</div></div>
    <div class="card"><div class="label">チャージ弾 / 連続正解</div><div class="value" id="ammoText">0 / 0</div></div>
    <div class="card"><div class="label">問題</div><div class="value" id="progressText">0 / 10</div></div>
  </div>
  <div class="layout">
    <div class="game-panel">
      <canvas id="gameCanvas" width="900" height="520"></canvas>
      <div class="overlay show" id="startOverlay">
        <div class="modal">
          <h1>算数シューティングバトル</h1>
          <p>4択に正解すると<strong>チャージ弾が3発</strong>たまる。下の<strong>左右ボタン</strong>で自機を動かして、<strong>発射</strong>でボスを撃て。3連続正解で<strong>必殺チャージ</strong>。</p>
          <div class="stats">
            <div class="stat"><div class="label">対象</div><div class="value">小6 算数</div></div>
            <div class="stat"><div class="label">単元</div><div class="value">割合・速さ・比など</div></div>
          </div>
          <div class="controls">
            <button class="bigbtn" id="startBtn">スタート</button>
            <button class="bigbtn secondary" id="howBtn">操作確認</button>
          </div>
        </div>
      </div>
      <div class="overlay" id="resultOverlay">
        <div class="modal">
          <h1 id="resultTitle">結果</h1>
          <p id="resultSummary"></p>
          <div class="stats">
            <div class="stat"><div class="label">正解数</div><div class="value" id="correctCountText">0</div></div>
            <div class="stat"><div class="label">発射数</div><div class="value" id="firedCountText">0</div></div>
          </div>
          <div class="controls">
            <button class="bigbtn" id="restartBtn">もう一回</button>
            <button class="bigbtn secondary" id="reviewBtn">ミスだけ復習</button>
          </div>
          <div class="miss-list" id="missList"></div>
        </div>
      </div>
    </div>
    <div class="quiz-panel">
      <div class="question-box">
        <div class="unit" id="unitText">準備中</div>
        <div class="question" id="questionText">スタートを押してね</div>
        <div class="sub" id="subText">正解してチャージ、動いて狙って撃つ。そこがシューティング部分。</div>
      </div>
      <div class="choices" id="choicesBox"></div>
      <div class="controls">
        <button class="bigbtn" id="leftBtn">← 左へ</button>
        <button class="bigbtn" id="rightBtn">右へ →</button>
        <button class="bigbtn" id="fireBtn">発射</button>
        <button class="bigbtn secondary" id="nextBtn">次の問題</button>
      </div>
      <div class="message" id="messageBox">問題に正解するとチャージ弾が3発。3連続正解で+5。外したらもったいない。</div>
    </div>
  </div>
</div>

<script>
const QUESTION_BANK = [
  { unit:"割合", difficulty:1, question:"80円の25%はいくら？", choices:["10円","20円","25円","40円"], answerIndex:1, explanation:"25% は 1/4。80÷4=20。" },
  { unit:"割合", difficulty:1, question:"240人の30%は何人？", choices:["48人","60人","72人","80人"], answerIndex:2, explanation:"240×0.3=72。" },
  { unit:"割合", difficulty:2, question:"1200円の10%引きの値段はいくら？", choices:["1080円","1100円","1120円","1180円"], answerIndex:0, explanation:"10%引きは 1200×0.9=1080。" },
  { unit:"割合", difficulty:2, question:"ある数の20%が16です。ある数はいくつ？", choices:["64","72","80","96"], answerIndex:2, explanation:"16÷0.2=80。" },
  { unit:"速さ", difficulty:1, question:"時速60kmで2時間進むと何km？", choices:["100km","110km","120km","130km"], answerIndex:2, explanation:"60×2=120。" },
  { unit:"速さ", difficulty:2, question:"1500mを5分で進みました。分速は何m？", choices:["250m","300m","350m","400m"], answerIndex:1, explanation:"1500÷5=300。" },
  { unit:"速さ", difficulty:3, question:"時速72kmは秒速何m？", choices:["18m","20m","22m","24m"], answerIndex:1, explanation:"72000÷3600=20。" },
  { unit:"比", difficulty:1, question:"8:12 をいちばん簡単な比にすると？", choices:["1:2","2:3","3:4","4:5"], answerIndex:1, explanation:"8も12も4で割ると 2:3。" },
  { unit:"比", difficulty:2, question:"24を3:1に分けると、大きい方はいくつ？", choices:["6","12","18","20"], answerIndex:2, explanation:"24÷4=6、3つ分で18。" },
  { unit:"比", difficulty:3, question:"A:B=3:2 で、AとBの合計が25のとき、Aはいくつ？", choices:["10","12","15","18"], answerIndex:2, explanation:"25÷5=5、Aは3つ分で15。" },
  { unit:"面積・体積", difficulty:1, question:"底辺10cm、高さ6cmの三角形の面積は？", choices:["16cm²","30cm²","36cm²","60cm²"], answerIndex:1, explanation:"10×6÷2=30。" },
  { unit:"面積・体積", difficulty:2, question:"上底4cm、下底8cm、高さ5cmの台形の面積は？", choices:["24cm²","30cm²","40cm²","60cm²"], answerIndex:1, explanation:"(4+8)×5÷2=30。" },
  { unit:"面積・体積", difficulty:1, question:"たて3cm、横4cm、高さ5cmの直方体の体積は？", choices:["12cm³","20cm³","60cm³","120cm³"], answerIndex:2, explanation:"3×4×5=60。" },
  { unit:"円", difficulty:2, question:"直径6cmの円の円周は？ 円周率は3.14", choices:["12.56cm","18.84cm","25.12cm","37.68cm"], answerIndex:1, explanation:"6×3.14=18.84。" },
  { unit:"円", difficulty:2, question:"半径5cmの円の面積は？ 円周率は3.14", choices:["31.4cm²","62.8cm²","78.5cm²","157cm²"], answerIndex:2, explanation:"5×5×3.14=78.5。" },
  { unit:"単位変換", difficulty:1, question:"1.5m は何cm？", choices:["15cm","150cm","1500cm","15000cm"], answerIndex:1, explanation:"1m=100cm。1.5m=150cm。" },
  { unit:"単位変換", difficulty:1, question:"3L は何mL？", choices:["30mL","300mL","3000mL","30000mL"], answerIndex:2, explanation:"1L=1000mL。3L=3000mL。" },
  { unit:"単位変換", difficulty:2, question:"1時間30分 は何分？", choices:["60分","70分","80分","90分"], answerIndex:3, explanation:"60+30=90。" }
];

const MAX_QUESTIONS = 10, PLAYER_MAX_HP = 5, BOSS_MAX_HP = 10;
const state = { playerHp:PLAYER_MAX_HP, bossHp:BOSS_MAX_HP, ammo:0, streak:0, questionIndex:0, correctCount:0, firedCount:0, currentQuestion:null, questions:[], answeredCurrent:false, gameOver:false, missed:[] };
const el = {
  playerHpText: document.getElementById("playerHpText"), bossHpText: document.getElementById("bossHpText"),
  ammoText: document.getElementById("ammoText"), progressText: document.getElementById("progressText"),
  unitText: document.getElementById("unitText"), questionText: document.getElementById("questionText"),
  subText: document.getElementById("subText"), choicesBox: document.getElementById("choicesBox"),
  messageBox: document.getElementById("messageBox"), leftBtn: document.getElementById("leftBtn"),
  rightBtn: document.getElementById("rightBtn"), fireBtn: document.getElementById("fireBtn"),
  nextBtn: document.getElementById("nextBtn"), startOverlay: document.getElementById("startOverlay"),
  resultOverlay: document.getElementById("resultOverlay"), startBtn: document.getElementById("startBtn"),
  howBtn: document.getElementById("howBtn"), restartBtn: document.getElementById("restartBtn"),
  reviewBtn: document.getElementById("reviewBtn"), resultTitle: document.getElementById("resultTitle"),
  resultSummary: document.getElementById("resultSummary"), correctCountText: document.getElementById("correctCountText"),
  firedCountText: document.getElementById("firedCountText"), missList: document.getElementById("missList")
};

const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
const player = { x:450, y:470, speed:8 }, boss = { x:450, y:90, dir:1, t:0, shield:0 };
const bullets = [], enemyShots = [], particles = [];
const keys = { left:false, right:false };
let shake = 0;

function shuffle(arr){ return arr.slice().sort(() => Math.random() - 0.5); }
function hearts(current, max){ return "♥".repeat(current) + "♡".repeat(Math.max(0, max-current)); }
function updateHud(){ el.playerHpText.textContent = hearts(state.playerHp, PLAYER_MAX_HP); el.bossHpText.textContent = hearts(state.bossHp, BOSS_MAX_HP); el.ammoText.textContent = `${state.ammo} / ${state.streak}`; el.progressText.textContent = `${Math.min(state.questionIndex, MAX_QUESTIONS)} / ${MAX_QUESTIONS}`; }
function setMessage(text){ el.messageBox.textContent = text; }
function disableChoices(){ [...el.choicesBox.querySelectorAll(".choice")].forEach(btn => btn.disabled = true); }

function loadQuestion(){
  if(state.questionIndex >= state.questions.length){ endGame(state.bossHp <= 0 ? "win" : "finish"); return; }
  state.currentQuestion = state.questions[state.questionIndex]; state.answeredCurrent = false;
  el.unitText.textContent = `${state.currentQuestion.unit} / 難易度 ${state.currentQuestion.difficulty}`;
  el.questionText.textContent = state.currentQuestion.question;
  el.subText.textContent = "正解でチャージ弾3発。不正解だと被ダメ。弾を当てて初めて削れる。";
  el.choicesBox.innerHTML = "";
  state.currentQuestion.choices.forEach((choice, index) => {
    const btn = document.createElement("button");
    btn.className = "choice"; btn.textContent = `${index+1}. ${choice}`;
    btn.addEventListener("click", () => answerQuestion(index, btn));
    el.choicesBox.appendChild(btn);
  });
  el.nextBtn.disabled = true;
  updateHud();
}

function answerQuestion(index, button){
  if(state.answeredCurrent || state.gameOver) return;
  state.answeredCurrent = true; disableChoices();
  const correct = index === state.currentQuestion.answerIndex;
  const btns = [...el.choicesBox.querySelectorAll(".choice")];
  btns[state.currentQuestion.answerIndex].classList.add("good");
  if(!correct) button.classList.add("bad");
  if(correct){
    state.correctCount++; state.streak++;
    const gained = state.streak >= 3 ? 5 : 3;
    state.ammo += gained; spawnBurst(player.x, player.y-18, state.streak >= 3 ? "#ffd166" : "#59d98e", 18);
    setMessage(`正解。${state.currentQuestion.explanation} 弾+${gained}。`);
  } else {
    state.streak = 0; state.playerHp--; shake = 10; state.missed.push(state.currentQuestion);
    enemyShots.push({ x: boss.x, y: boss.y+30, vy: 6, r: 7, color:"#ff7676" });
    setMessage(`不正解。${state.currentQuestion.explanation} 1ダメージ。`);
    if(state.playerHp <= 0){ updateHud(); endGame("lose"); return; }
  }
  state.questionIndex++; el.nextBtn.disabled = false; updateHud();
}

function nextQuestion(){ if(state.answeredCurrent && !state.gameOver) loadQuestion(); }
function movePlayer(dx){ player.x = Math.max(40, Math.min(canvas.width-40, player.x + dx)); }
function fire(){ if(state.gameOver) return; if(state.ammo <= 0){ setMessage("弾切れ。まず答えて。"); return; } bullets.push({ x: player.x, y: player.y-18, vy:-10, r:5 }); state.ammo--; state.firedCount++; updateHud(); }

function spawnBurst(x,y,color,count){ for(let i=0;i<count;i++) particles.push({ x, y, vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6, life:20+Math.random()*12, color }); }
function hitBoss(){ state.bossHp--; shake = 8; boss.shield = 10; spawnBurst(boss.x, boss.y, "#73b7ff", 22); updateHud(); if(state.bossHp <= 0) endGame("win"); else setMessage(`命中。ボス残りHP ${state.bossHp}。`); }
function takePlayerHit(){ state.playerHp--; shake = 10; state.streak = 0; spawnBurst(player.x, player.y, "#ff7676", 20); updateHud(); if(state.playerHp <= 0) endGame("lose"); }

function renderMissList(){
  if(!state.missed.length){ el.missList.innerHTML = '<div class="miss-item">ミスなし。珍しく優秀。</div>'; return; }
  el.missList.innerHTML = state.missed.map(q => `<div class="miss-item"><strong>${q.question}</strong><br><span style="color:#b8c4e6">${q.explanation}</span></div>`).join("");
}
function endGame(type){
  state.gameOver = true; el.resultOverlay.classList.add("show");
  el.correctCountText.textContent = String(state.correctCount); el.firedCountText.textContent = String(state.firedCount);
  if(type === "win"){ el.resultTitle.textContent = "撃破成功"; el.resultSummary.textContent = "答えて、動いて、当てて倒した。これならちゃんとゲーム。"; }
  else if(type === "lose"){ el.resultTitle.textContent = "ゲームオーバー"; el.resultSummary.textContent = "不正解か弾の使い方が雑。復習して出直し。"; }
  else { el.resultTitle.textContent = "ステージ終了"; el.resultSummary.textContent = "10問終了。ボスが残るなら撃ち方が甘い。"; }
  renderMissList();
}
function resetGame(review=false){
  state.playerHp=PLAYER_MAX_HP; state.bossHp=BOSS_MAX_HP; state.ammo=0; state.streak=0; state.questionIndex=0; state.correctCount=0; state.firedCount=0; state.currentQuestion=null;
  state.questions = review && state.missed.length ? shuffle(state.missed).slice(0, Math.min(MAX_QUESTIONS, state.missed.length)) : shuffle(QUESTION_BANK).slice(0, MAX_QUESTIONS);
  state.answeredCurrent=false; state.gameOver=false; if(!review) state.missed=[];
  bullets.length=0; enemyShots.length=0; particles.length=0; player.x=canvas.width/2; boss.x=canvas.width/2;
  updateHud(); el.resultOverlay.classList.remove("show"); el.startOverlay.classList.remove("show");
  setMessage("正解してチャージ、動いて狙って発射。答えるだけじゃ勝てない。"); loadQuestion();
}

function drawRoundRect(x, y, w, h, r){
  ctx.beginPath(); ctx.moveTo(x+r, y); ctx.arcTo(x+w, y, x+w, y+h, r); ctx.arcTo(x+w, y+h, x, y+h, r); ctx.arcTo(x, y+h, x, y, r); ctx.arcTo(x, y, x+w, y, r); ctx.closePath();
}
function drawBackground(){
  const g = ctx.createLinearGradient(0,0,0,canvas.height); g.addColorStop(0, "#101832"); g.addColorStop(1, "#0a1020"); ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<40;i++){ const x = (i*137 % canvas.width), y = (i*71 + performance.now()*0.02) % canvas.height; ctx.fillStyle = "rgba(255,255,255,0.18)"; ctx.fillRect(x,y,2,2); }
  ctx.strokeStyle = "rgba(115,183,255,.12)";
  for(let y=80; y<canvas.height; y+=40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
}
function drawPlayer(){
  ctx.save(); ctx.translate(player.x, player.y); ctx.fillStyle = "#73b7ff";
  ctx.beginPath(); ctx.moveTo(0,-22); ctx.lineTo(24,16); ctx.lineTo(0,8); ctx.lineTo(-24,16); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#d9ecff"; ctx.fillRect(-4,-10,8,18); ctx.restore();
}
function drawBoss(){
  ctx.save(); ctx.translate(boss.x, boss.y); ctx.fillStyle = boss.shield > 0 ? "#a4d0ff" : "#ff9f6e";
  drawRoundRect(-55, -28, 110, 56, 20); ctx.fill();
  ctx.fillStyle = "#6b2f1a"; ctx.fillRect(-28, -10, 18, 12); ctx.fillRect(10, -10, 18, 12);
  ctx.fillStyle = "#fff3e8"; ctx.fillRect(-20, 8, 40, 8);
  if (boss.shield > 0){ ctx.strokeStyle = "rgba(115,183,255,.9)"; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(0, 0, 72, 0, Math.PI*2); ctx.stroke(); }
  ctx.restore();
}
function drawBullets(){
  bullets.forEach(b => { ctx.fillStyle = "#ffd166"; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); });
  enemyShots.forEach(s => { ctx.fillStyle = s.color; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); });
  particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life/30); ctx.fillRect(p.x, p.y, 4, 4); ctx.globalAlpha = 1; });
}
function drawGuide(){
  ctx.fillStyle = "rgba(255,255,255,.10)"; ctx.fillRect(0, canvas.height-52, canvas.width, 52);
  ctx.fillStyle = "#dfe7ff"; ctx.font = "bold 18px -apple-system, BlinkMacSystemFont, sans-serif"; ctx.fillText("正解でチャージ → 左右で移動 → 発射で命中させろ", 24, canvas.height-20);
}
function stepGame(){
  if(keys.left) movePlayer(-player.speed); if(keys.right) movePlayer(player.speed);
  boss.t += 0.02; boss.x += boss.dir * 1.8; if(boss.x < 100 || boss.x > canvas.width - 100) boss.dir *= -1; boss.x += Math.sin(boss.t) * 0.6; if(boss.shield > 0) boss.shield--;
  for(let i=bullets.length-1;i>=0;i--){ const b = bullets[i]; b.y += b.vy; if(b.y < -10){ bullets.splice(i,1); continue; } if(Math.abs(b.x - boss.x) < 58 && Math.abs(b.y - boss.y) < 34){ bullets.splice(i,1); hitBoss(); } }
  if(Math.random() < 0.018 && !state.gameOver) enemyShots.push({ x: boss.x + (Math.random()-0.5)*36, y: boss.y+20, vy: 5 + Math.random()*1.4, r: 6, color:"#ff7676" });
  for(let i=enemyShots.length-1;i>=0;i--){ const s = enemyShots[i]; s.y += s.vy; if(s.y > canvas.height+10){ enemyShots.splice(i,1); continue; } if(Math.abs(s.x - player.x) < 28 && Math.abs(s.y - player.y) < 24){ enemyShots.splice(i,1); takePlayerHit(); } }
  for(let i=particles.length-1;i>=0;i--){ const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 1; if(p.life <= 0) particles.splice(i,1); }
}
function render(){
  ctx.save();
  if(shake > 0){ const dx = (Math.random()-0.5) * shake, dy = (Math.random()-0.5) * shake; ctx.translate(dx, dy); shake *= 0.85; }
  drawBackground(); drawBoss(); drawPlayer(); drawBullets(); drawGuide(); ctx.restore();
}
function loop(){ if(!state.gameOver && !el.startOverlay.classList.contains("show")) stepGame(); render(); requestAnimationFrame(loop); }

window.addEventListener("keydown", e => { if(e.key === "ArrowLeft") keys.left = true; if(e.key === "ArrowRight") keys.right = true; if(e.key === " ") { e.preventDefault(); fire(); } });
window.addEventListener("keyup", e => { if(e.key === "ArrowLeft") keys.left = false; if(e.key === "ArrowRight") keys.right = false; });

let leftHold = null, rightHold = null;
function holdStart(dir){ return (ev) => { ev.preventDefault(); if(dir === "left"){ keys.left = true; leftHold = setInterval(() => movePlayer(-player.speed), 16); } else { keys.right = true; rightHold = setInterval(() => movePlayer(player.speed), 16); } }; }
function holdEnd(dir){ return (ev) => { ev.preventDefault(); if(dir === "left"){ keys.left = false; clearInterval(leftHold); } else { keys.right = false; clearInterval(rightHold); } }; }
["pointerdown","touchstart"].forEach(ev => el.leftBtn.addEventListener(ev, holdStart("left"), {passive:false}));
["pointerup","pointercancel","pointerleave","touchend"].forEach(ev => el.leftBtn.addEventListener(ev, holdEnd("left"), {passive:false}));
["pointerdown","touchstart"].forEach(ev => el.rightBtn.addEventListener(ev, holdStart("right"), {passive:false}));
["pointerup","pointercancel","pointerleave","touchend"].forEach(ev => el.rightBtn.addEventListener(ev, holdEnd("right"), {passive:false}));

el.fireBtn.addEventListener("click", fire);
el.nextBtn.addEventListener("click", nextQuestion);
el.startBtn.addEventListener("click", () => resetGame(false));
el.howBtn.addEventListener("click", () => setMessage("4択に正解→弾チャージ。左右で自機を動かして、発射で当てる。当てなきゃ意味ない。"));
el.restartBtn.addEventListener("click", () => resetGame(false));
el.reviewBtn.addEventListener("click", () => state.missed.length ? resetGame(true) : setMessage("ミスがない。今日は珍しく優秀。"));

updateHud(); loop();
</script>
</body>
</html>
