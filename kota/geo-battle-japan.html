<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>都道府県バトル — 天下統一</title>
<style>
:root {
  --bg:#1a1510; --surface:#2b2018; --surface2:#3d2f25;
  --border:#8c7853; --accent:#ffd1d1; --accent2:#b33e5c;
  --gold:#e6b422; --green:#3a7a40; --red:#c0392b;
  --text:#fdfbf7; --muted:#a6998a;
  --hp-enemy:#c0392b; --hp-player:#3a7a40;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:"Yu Mincho","Hiragino Mincho ProN",serif;}
#app{width:100vw;height:100vh;position:relative;overflow:hidden;}

.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;}
.screen.active{display:flex;}

#titleScreen{background:radial-gradient(ellipse at 50% 30%,#2b2018 0%,#1a1510 70%);}
.title-bg-pattern{position:absolute;inset:0;opacity:0.05;background-image:radial-gradient(var(--border) 1px, transparent 1px);background-size:20px 20px;pointer-events:none;}
.title-logo{text-align:center;z-index:1;}
.title-main{font-size:clamp(2rem,7vw,3.5rem);font-weight:900;letter-spacing:.05em;
  background:linear-gradient(135deg,#ffd1d1,#fff,#e6b422);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;filter:drop-shadow(0 0 30px rgba(255,209,209,.5));}
.title-sub{font-size:clamp(1rem,2.5vw,1.5rem);color:var(--muted);margin-top:.4em;letter-spacing:.25em;}
.title-btns{margin-top:2.5rem;display:flex;flex-direction:column;gap:.8rem;width:min(320px,80vw);z-index:1;}
.btn{padding:1rem 1.5rem;border:none;border-radius:8px;font-size:1.05rem;font-weight:700;cursor:pointer;
  transition:transform .15s,box-shadow .15s;letter-spacing:.05em;touch-action:manipulation;font-family:inherit;}
.btn:active{transform:scale(.96);}
.btn-primary{background:linear-gradient(135deg,#b33e5c,#c0392b);color:#fff;
  box-shadow:0 0 20px rgba(192,57,43,.4);border:1px solid #ffd1d1;}
.btn-primary:hover{box-shadow:0 0 30px rgba(192,57,43,.7);}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-gold{background:linear-gradient(135deg,#b8860b,#e6b422);color:#000;
  box-shadow:0 0 20px rgba(230,180,34,.4);}

#mapScreen{background:var(--bg);flex-direction:column;justify-content:flex-start;overflow:hidden;}
.map-header{width:100%;background:var(--surface);border-bottom:1px solid var(--border);
  padding:.6rem 1rem;display:flex;gap:.8rem;align-items:center;flex-wrap:wrap;z-index:5;}
.stat-badge{background:var(--surface2);border:1px solid var(--border);border-radius:4px;
  padding:.3rem .7rem;font-size:.8rem;display:flex;align-items:center;gap:.4rem;}
.stat-badge span{color:var(--accent);font-weight:700;}
.map-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;width:100%;padding:1rem;}
.map-title{text-align:center;font-size:1.3rem;font-weight:800;color:var(--accent);margin-bottom:.8rem;}
.country-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.7rem;
  max-width:900px;margin:0 auto;}
.country-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;
  padding:.8rem;cursor:pointer;transition:all .2s;touch-action:manipulation;position:relative;overflow:hidden;}
.country-card:hover,.country-card:active{transform:translateY(-2px);border-color:var(--accent);
  box-shadow:0 4px 20px rgba(255,209,209,.2);}
.country-card.cleared{border-color:var(--gold);background:linear-gradient(135deg,var(--surface),#3d2f25);}
.country-card.boss-target{border-color:var(--gold);animation:bossGlow .8s infinite alternate;}
@keyframes bossGlow{from{box-shadow:0 0 8px rgba(230,180,34,.3);}to{box-shadow:0 0 20px rgba(230,180,34,.8);}}
.cc-flag{font-size:1.8rem;text-align:center;}
.cc-name{font-size:1rem;font-weight:700;text-align:center;margin-top:.3rem;}
.cc-region{font-size:.7rem;color:var(--muted);text-align:center;}
.cc-status{position:absolute;top:.4rem;right:.4rem;font-size:.8rem;}
.cc-hp-bar{margin-top:.4rem;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.cc-hp-fill{height:100%;background:var(--hp-enemy);border-radius:2px;transition:width .3s;}
.boss-card{grid-column:1/-1;background:linear-gradient(135deg,#3a1010,#2a0808);
  border:2px solid var(--gold);border-radius:8px;padding:1rem;text-align:center;cursor:pointer;}
.boss-card-title{font-size:1.2rem;font-weight:900;color:var(--gold);}
.boss-card-sub{font-size:.8rem;color:var(--muted);margin-top:.2rem;}
.progress-bar-wrap{width:100%;max-width:900px;margin:.5rem auto .2rem;}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--gold));transition:width .5s;}
.progress-label{font-size:.75rem;color:var(--muted);text-align:right;margin-top:.2rem;}

#battleScreen{background:radial-gradient(ellipse at 50% 0%,#2b2018 0%,var(--bg) 60%);
  flex-direction:column;justify-content:flex-start;overflow:hidden;}
.battle-header{width:100%;padding:.6rem 1rem;display:flex;justify-content:space-between;align-items:center;
  background:var(--surface);border-bottom:1px solid var(--border);}
.battle-title{font-size:1.1rem;font-weight:700;color:var(--accent);}
.battle-pts{font-size:.9rem;color:var(--gold);}
.battle-arena{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:1rem;width:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.enemy-area{text-align:center;margin-bottom:.8rem;}
.enemy-flag{font-size:clamp(3rem,8vw,4.5rem);filter:drop-shadow(0 0 20px rgba(192,57,43,.5));
  animation:enemyFloat 2s ease-in-out infinite;transition:all .3s;}
@keyframes enemyFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.enemy-flag.hit{animation:enemyHit .5s ease!important;filter:brightness(2) drop-shadow(0 0 30px #fff)!important;}
.enemy-flag.dead{animation:enemyDie .8s forwards!important;pointer-events:none;}
@keyframes enemyDie{
  0%{transform:scale(1);filter:brightness(2) drop-shadow(0 0 30px #f00);}
  100%{transform:scale(0) rotate(180deg);opacity:0;}
}
@keyframes enemyHit{
  0%{transform:translateY(0) scale(1);}
  15%{transform:translateY(-12px) scale(1.15);filter:brightness(2);}
  30%{transform:translateX(-8px) scale(.95);}
  45%{transform:translateX(8px) scale(.95);}
  60%{transform:translateX(-4px) scale(1);}
  80%{transform:translateY(0) scale(1);}
  100%{transform:translateY(0) scale(1);}
}
.enemy-flag.miss-shake{animation:enemyTaunt .4s ease!important;}
@keyframes enemyTaunt{
  0%,100%{transform:translateY(0) rotate(0);}
  25%{transform:translateY(-3px) rotate(-5deg);}
  75%{transform:translateY(-3px) rotate(5deg);}
}
.enemy-name.hidden-for-flag{color:transparent;text-shadow:none;background:var(--border);
  border-radius:4px;display:inline-block;padding:.1em .8em;}
.enemy-name{font-size:clamp(1.2rem,4vw,2rem);font-weight:900;margin:.3rem 0;color:var(--gold);}
.hp-row{display:flex;align-items:center;gap:.5rem;width:min(400px,90vw);}
.hp-label{font-size:.75rem;color:var(--muted);width:30px;text-align:right;}
.hp-bar{flex:1;height:10px;background:var(--surface2);border:1px solid var(--border);border-radius:2px;overflow:hidden;}
.hp-fill{height:100%;transition:width .4s;}
.hp-enemy-fill{background:linear-gradient(90deg,#900,#c0392b);}
.hp-val{font-size:.75rem;font-weight:700;width:45px;}
.combo-badge{background:linear-gradient(135deg,#c0392b,#e6b422);color:#fff;
  border-radius:4px;padding:.2rem .7rem;font-size:.8rem;font-weight:700;margin:.4rem 0;
  opacity:0;transition:opacity .2s;border:1px solid #fff;}
.combo-badge.show{opacity:1;}
.question-box{width:min(600px,95vw);background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:1rem 1.2rem;margin:.5rem 0;}
.q-meta{font-size:.72rem;color:var(--muted);margin-bottom:.6rem;display:flex;justify-content:space-between;
  border-bottom:1px solid var(--border);padding-bottom:.3rem;}
.q-text{font-size:clamp(1rem,2.5vw,1.2rem);font-weight:700;line-height:1.6;}
.q-flag-display{font-size:3.5rem;text-align:center;margin:.6rem 0;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5));}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.8rem;}
.choice-btn{background:var(--surface2);border:1px solid var(--border);border-radius:4px;
  padding:.8rem .6rem;font-size:clamp(.85rem,2vw,.95rem);cursor:pointer;transition:all .15s;
  text-align:center;touch-action:manipulation;color:var(--text);font-weight:600;font-family:inherit;}
.choice-btn:hover{border-color:var(--accent);background:#4a3b30;}
.choice-btn:active{transform:scale(.97);}
.choice-btn.correct{background:#3a7a40;border-color:#fff;color:#fff;}
.choice-btn.wrong{background:#5a1a1a;border-color:var(--red);color:var(--accent);}
.choice-btn.reveal{background:#3a7a40;border-color:#fff;color:#fff;}
.choice-btn.flag-choice{font-size:1.8rem;padding:.5rem;line-height:1.2;}
.q-feedback{text-align:center;font-size:1rem;margin-top:.6rem;min-height:1.2em;font-weight:900;}
.q-feedback.ok{color:var(--gold);}
.q-feedback.ng{color:var(--red);}
.timer-bar{width:min(600px,95vw);height:4px;background:var(--surface2);overflow:hidden;margin-bottom:.4rem;}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--gold));transition:width .1s linear;}
.battle-footer{width:100%;padding:.5rem 1rem;background:var(--surface);border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;}
.q-counter{font-size:.9rem;color:var(--muted);}

#resultScreen{background:radial-gradient(ellipse at 50% 30%,#2b2018,var(--bg));}
.result-box{text-align:center;padding:2rem;max-width:420px;width:90%;background:var(--surface);border:2px solid var(--border);border-radius:8px;}
.result-icon{font-size:4rem;margin-bottom:.5rem;}
.result-title{font-size:2rem;font-weight:900;margin-bottom:.3rem;}
.result-title.win{color:var(--gold);}
.result-title.lose{color:var(--red);}
.result-title.boss{color:var(--accent);}
.result-stats{background:var(--surface2);border:1px solid var(--border);border-radius:4px;
  padding:1rem;margin:1rem 0;text-align:left;display:flex;flex-direction:column;gap:.6rem;}
.rs-row{display:flex;justify-content:space-between;font-size:1rem;}
.rs-val{font-weight:700;color:var(--accent);}
.rs-val.gold{color:var(--gold);}
.result-btns{display:flex;flex-direction:column;gap:.6rem;margin-top:1rem;}

.damage-text{position:absolute;font-size:1.5rem;font-weight:900;pointer-events:none;
  animation:dmgFloat 1s forwards;}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-60px);}}
.screen-flash{position:absolute;inset:0;pointer-events:none;opacity:0;border-radius:inherit;}
.screen-flash.hit{animation:flashHit .3s forwards;}
.screen-flash.miss{animation:flashMiss .3s forwards;}
@keyframes flashHit{0%,100%{opacity:0;}30%{opacity:.25;background:var(--gold);}}
@keyframes flashMiss{0%,100%{opacity:0;}30%{opacity:.25;background:var(--red);}}

.back-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);
  padding:.4rem .8rem;font-size:.8rem;cursor:pointer;font-family:inherit;}

#zaScreen{background:radial-gradient(ellipse at 50% 50%,#fff9c4,var(--bg));flex-direction:column;justify-content:center;align-items:center;}
.za-ticket{background:linear-gradient(135deg,#ffcc00,#ff6600);border:4px solid #fff;border-radius:16px;padding:2rem;text-align:center;box-shadow:0 10px 40px rgba(255,102,0,.6),inset 0 0 20px rgba(255,255,255,.5);animation:ticketFloat 3s infinite ease-in-out;transform-style:preserve-3d;max-width:90%;}
@keyframes ticketFloat{0%,100%{transform:translateY(0) rotateX(0) rotateY(0);}50%{transform:translateY(-15px) rotateX(5deg) rotateY(-5deg);}}
.za-title{font-size:clamp(1.5rem,5vw,2.5rem);font-weight:900;color:#fff;text-shadow:2px 2px 0 #d35400,-2px -2px 0 #d35400,2px -2px 0 #d35400,-2px 2px 0 #d35400;margin-bottom:1rem;font-family:sans-serif;}
.za-sub{font-size:1.2rem;color:#fff;font-weight:700;margin-bottom:2rem;background:#d35400;padding:.4rem;border-radius:8px;}
.za-desc{font-size:1rem;color:#000;font-weight:bold;margin-bottom:1.5rem;}
</style>

</head>
<body>
<div id="app">

<div id="titleScreen" class="screen active">
  <div class="title-bg-pattern"></div>
  <div class="title-logo">
    <div class="title-main">🗾 都道府県バトル</div>
    <div class="title-sub">〜 天下統一 〜</div>
  </div>
  <div class="title-btns">
    <button class="btn btn-primary" id="btnStart">⚔️ 天下統一を始める</button>
  </div>
</div>

<div id="mapScreen" class="screen">
  <div class="map-header">
    <div class="stat-badge">🗾 平定 <span id="hClear">0</span>/47</div>
    <div class="stat-badge" id="zaTicketBtn" style="display:none;background:linear-gradient(45deg,#ffd700,#ff8c00);color:#000;cursor:pointer;animation:bossGlow 1s infinite alternate;font-weight:bold;" onclick="showScreen('zaScreen')">🎁 Z-Aチケットを表示</div>
    <button class="back-btn" id="btnMapBack">← タイトル</button>
  </div>
  <div class="map-area">
    <div class="map-title">🗾 日本地図 — 次の攻略先を選べ</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">0% 平定済み</div>
    </div>
    <div class="country-grid" id="countryGrid"></div>
  </div>
</div>

<div id="battleScreen" class="screen">
  <div class="screen-flash" id="battleFlash"></div>
  <div class="battle-header">
    <div class="battle-title" id="bTitle">vs 〇〇</div>
    
  </div>
  <div class="battle-arena">
    <div class="enemy-area" style="position:relative;">
      <div class="enemy-flag" id="bFlag">🏯</div>
      <div class="enemy-name" id="bName">〇〇県</div>
      <div class="hp-row">
        <div class="hp-label">敵陣</div>
        <div class="hp-bar"><div class="hp-fill hp-enemy-fill" id="bEnemyHp" style="width:100%"></div></div>
        <div class="hp-val" id="bEnemyHpVal">100/100</div>
      </div>
    </div>
    <div class="combo-badge" id="comboBadge">🔥 3連続！×1.2</div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
    <div class="question-box">
      <div class="q-meta">
        <span id="qType">県庁所在地</span>
        <span id="qDiff">通常 達成</span>
      </div>
      <div class="q-text" id="qText">問題文</div>
      <div class="q-flag-display" id="qFlagDisplay" style="display:none;"></div>
      <div class="choices" id="choices"></div>
      <div class="q-feedback" id="qFeedback"></div>
    </div>
  </div>
  <div class="battle-footer">
    <div class="q-counter" id="qCounter">問1 / 6</div>
    <button class="btn btn-secondary" style="padding:.4rem .8rem;font-size:.8rem;" id="btnBattleQuit">撤退する</button>
  </div>
</div>

<div id="resultScreen" class="screen">
  <div class="result-box">
    <div class="result-icon" id="rIcon">🏆</div>
    <div class="result-title" id="rTitle">勝利!</div>
    <div id="rSubtitle" style="color:var(--muted);margin-bottom:.5rem;font-size:1rem;"></div>
    <div class="result-stats" id="rStats"></div>
    <div class="result-btns" id="rBtns"></div>
  </div>
</div>


<div id="zaScreen" class="screen">
  <div class="za-ticket">
    <div class="za-title">✨ Pokémon LEGENDS Z-A ✨<br>ごほうびGETチケット</div>
    <div class="za-sub">世界＆日本 完全制覇おめでとう！</div>
    <div class="za-desc">キミは世界のすべての国と、日本のすべての都道府県を完璧に平定した！<br><br>この画面をパパに見せて、<br>「Pokémon LEGENDS Z-A」をゲットしてもらおう！</div>
    <button class="btn btn-gold" onclick="openMap()" style="font-size:1.2rem;padding:1rem 2rem;">🗺️ 地図に戻る</button>
  </div>
</div>
</div>

        "text": "沖縄県の県庁所在地（都・道・府庁所在地）は？",
        "choices": [
          "大津市",
          "那覇市",
          "大分市",
          "松江市"
        ],
        "ans": 1,
        "hard": false
      },
      {
        "type": "地方",
        "text": "沖縄県がある地方は？",
        "choices": [
          "中部地方",
          "九州・沖縄地方",
          "中国地方",
          "四国地方"
        ],
        "ans": 1,
        "hard": false
      },
      {
        "type": "特産",
        "text": "沖縄県の有名な特産品・名産は？",
        "choices": [
          "わかめ",
          "米菓",
          "すだち",
          "サトウキビ"
        ],
        "ans": 3,
        "hard": true
      },
      {
        "type": "名所",
        "text": "沖縄県にある有名な場所（名所）は？",
        "choices": [
          "白神山地",
          "首里城",
          "名古屋城",
          "中尊寺金色堂"
        ],
        "ans": 1,
        "hard": true
      },
      {
        "type": "地理",
        "text": "次のうち、沖縄県に含まれる特徴は？",
        "choices": [
          "那覇市",
          "秋田市",
          "近江牛",
          "砂漠"
        ],
        "ans": 0,
        "hard": true
      }
    ]
  }
]
;

let state = {
  cleared: [], wrongQ: [], points: 0, ptsHistory: [], bossClears: 0,
  currentCountry: null, questions: [], qIdx: 0,
  enemyHp: 100, enemyMaxHp: 100, combo: 0, battlePts: 0,
  correctCount: 0, timerInterval: null, timerLeft: 0,
  answered: false, isBoss: false,
};

function saveState(){ try{ localStorage.setItem("geoBattleJapan", JSON.stringify(state)); }catch(e){} }
function loadState(){
  try{ const d=localStorage.getItem("geoBattleJapan"); if(d){const s=JSON.parse(d);Object.assign(state,s);} }catch(e){}
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function openMap(){ showScreen("mapScreen"); renderMap(); }

function renderMap(){
  document.getElementById("hClear").textContent=state.cleared.length;
  
  const pct=Math.round(state.cleared.length/COUNTRIES.length*100);
  document.getElementById("progressFill").style.width=pct+"%";
  document.getElementById("progressLabel").textContent=pct+"% 平定済み";

  const grid=document.getElementById("countryGrid");
  grid.innerHTML="";
  // Check Z-A condition
  const wState = JSON.parse(localStorage.getItem("geoBattleState")||"{}");
  const jState = JSON.parse(localStorage.getItem("geoBattleJapan")||"{}");
  const wClear = (wState.cleared||[]).length;
  const jClear = (jState.cleared||[]).length;
  // World has 130, Japan has 47
  if(wClear >= 130 && jClear >= 47) {
    document.getElementById("zaTicketBtn").style.display = "flex";
  } else {
    document.getElementById("zaTicketBtn").style.display = "none";
  }


  const bossReady=state.cleared.length>0&&state.cleared.length%10===0&&state.cleared.length>(state.bossClears*10);
  if(bossReady){
    const bc=document.createElement("div"); bc.className="boss-card";
    bc.innerHTML=`<div class="boss-card-title">⚠️ 幕府軍出現！</div><div class="boss-card-sub">${state.cleared.length}か国平定記念 — 幕府軍による一斉テスト</div>`;
    bc.addEventListener("click",()=>startBoss());
    grid.appendChild(bc);
  }

  COUNTRIES.forEach((c)=>{
    const cleared=state.cleared.includes(c.id);
    const card=document.createElement("div");
    card.className="country-card"+(cleared?" cleared":"");
    card.innerHTML=`<div class="cc-flag">${c.flag}</div><div class="cc-name">${c.name}</div><div class="cc-region">${c.region}</div><div class="cc-status">${cleared?"🌸":""}</div><div class="cc-hp-bar"><div class="cc-hp-fill" style="width:${cleared?0:100}%"></div></div>`;
    if(!cleared){
      card.addEventListener("click",()=>startBattle(c));
    }
    grid.appendChild(card);
  });
}

function buildQuestions(country, isBoss){
  if(isBoss){
    const pool=[];
    COUNTRIES.filter(c=>state.cleared.includes(c.id)).forEach(cc=>{
      cc.questions.forEach(q=>pool.push({...q,countryName:cc.name}));
    });
    return shuffle(pool).slice(0,10).map(q=>({...q,text:(q.countryName?`[${q.countryName}] `:"")+q.text}));
  }
  return shuffle([...country.questions]).slice(0,6);
}

function shuffle(arr){return[...arr].sort(()=>Math.random()-.5);}

const MONSTERS = {"北海道地方":"🐻","東北地方":"👹","関東地方":"🗼","中部地方":"🗻","近畿地方":"🏯","中国地方":"⛩️","四国地方":"🍊","九州地方":"🌋","九州・沖縄地方":"🌺"};
function getMonster(region){ return MONSTERS[region]||"🏯"; }

function startBattle(country){
  state.currentCountry=country; state.isBoss=false;
  state.questions=buildQuestions(country,false);
  state.qIdx=0; state.enemyMaxHp=state.questions.length*20;
  state.enemyHp=state.enemyMaxHp; state.combo=0; state.battlePts=0; state.correctCount=0;
  const flagEl = document.getElementById("bFlag");
  flagEl.textContent=getMonster(country.region);
  flagEl.classList.remove("dead");
  document.getElementById("bName").textContent=country.name;
  document.getElementById("bName").classList.remove("hidden-for-flag");
  document.getElementById("bTitle").textContent=`⚔️ vs ${country.name}`;
  showScreen("battleScreen"); renderBattleHp(); showQuestion();
}

function startBoss(){
  state.isBoss=true; state.currentCountry={name:"幕府軍",region:"天下",id:"boss"};
  state.questions=buildQuestions(null,true);
  if(state.questions.length===0){alert("問題がありません！");return;}
  state.qIdx=0; state.enemyMaxHp=state.questions.length*20;
  state.enemyHp=state.enemyMaxHp; state.combo=0; state.battlePts=0; state.correctCount=0;
  const flagEl = document.getElementById("bFlag");
  flagEl.textContent="🐎";
  flagEl.classList.remove("dead");
  document.getElementById("bName").textContent="幕府軍 精鋭部隊";
  document.getElementById("bTitle").textContent="⚔️ 幕府軍襲来！";
  showScreen("battleScreen"); renderBattleHp(); showQuestion();
}

function renderBattleHp(){
  const pct=Math.max(0,state.enemyHp/state.enemyMaxHp*100);
  document.getElementById("bEnemyHp").style.width=pct+"%";
  document.getElementById("bEnemyHpVal").textContent=`${state.enemyHp}/${state.enemyMaxHp}`;
  
}

function showQuestion(){
  clearTimer();
  if(state.qIdx>=state.questions.length){
    const isPerfect = state.correctCount === state.questions.length;
    if(isPerfect) {
      state.enemyHp = 0;
      document.getElementById("bFlag").classList.add("dead");
      renderBattleHp();
      setTimeout(() => endBattle(true), 1200);
      return;
    }
    renderBattleHp();
    endBattle(false);
    return;
  }
  const q=state.questions[state.qIdx];
  state.answered=false;
  document.getElementById("qCounter").textContent=`問${state.qIdx+1} / ${state.questions.length}`;
  document.getElementById("qType").textContent=q.type||"";
  const isHard=q.hard;
  document.getElementById("qDiff").textContent=isHard?`難問 達成`:`通常 達成`;
  document.getElementById("qText").textContent=q.text;
  document.getElementById("qFeedback").textContent="";
  document.getElementById("qFeedback").className="q-feedback";

  const flagDisp=document.getElementById("qFlagDisplay");
  const nameEl=document.getElementById("bName");
  if(q.isFlag && q.flagShow){
    flagDisp.textContent=q.flagShow; flagDisp.style.display="block"; nameEl.classList.add("hidden-for-flag");
  } else { flagDisp.style.display="none"; nameEl.classList.remove("hidden-for-flag"); }

  const cb=document.getElementById("comboBadge");
  if(state.combo>=5){cb.textContent=`🔥 ${state.combo}連続！×1.5`;cb.classList.add("show");}
  else if(state.combo>=3){cb.textContent=`🔥 ${state.combo}連続！×1.2`;cb.classList.add("show");}
  else cb.classList.remove("show");

  const wrap=document.getElementById("choices"); wrap.innerHTML="";
  q.choices.forEach((cTxt,i)=>{
    const btn=document.createElement("button"); btn.className="choice-btn"; btn.textContent=cTxt;
    btn.addEventListener("click",()=>answer(i,q,btn,wrap)); wrap.appendChild(btn);
  });
  startTimer(15);
}

function startTimer(sec){
  state.timerLeft=sec*10;
  const fill=document.getElementById("timerFill"); fill.style.width="100%";
  fill.style.background="linear-gradient(90deg,var(--accent2),var(--gold))";
  state.timerInterval=setInterval(()=>{
    state.timerLeft--; const pct=state.timerLeft/(sec*10)*100;
    fill.style.width=pct+"%";
    if(pct<30)fill.style.background="var(--red)";
    if(state.timerLeft<=0){clearTimer();if(!state.answered)timeOut();}
  },100);
}
function clearTimer(){clearInterval(state.timerInterval);}

function timeOut(){
  if(state.answered)return; state.answered=true; state.combo=0;
  const q=state.questions[state.qIdx];
  const wrap=document.getElementById("choices");
  wrap.querySelectorAll(".choice-btn").forEach(btn=>{
    if(btn.textContent===q.choices[q.ans])btn.classList.add("reveal");
  });
  document.getElementById("qFeedback").textContent=`⏰ 時間切れ！正解: ${q.choices[q.ans]}`;
  document.getElementById("qFeedback").className="q-feedback ng";
  flash("miss"); setTimeout(()=>{state.qIdx++;showQuestion();},1800);
}

function answer(idx,q,btn,wrap){
  if(state.answered)return; state.answered=true; clearTimer();
  const correct=idx===q.ans; const isHard=q.hard;
  if(correct){
    btn.classList.add("correct"); state.combo++;
    let mult=state.combo>=5?1.5:state.combo>=3?1.2:1;
    const dmg=Math.round((isHard?20:10)*mult);
    state.enemyHp=Math.max(0,state.enemyHp-dmg);
    
    state.correctCount++; renderBattleHp();
    spawnDamageText("-"+dmg,"#e6b422"); flash("hit");
    document.getElementById("qFeedback").textContent=`🌸 正解！ ${mult>1?"連撃×"+mult+" ":""}-${dmg}ダメージ`;
    document.getElementById("qFeedback").className="q-feedback ok";
  } else {
    btn.classList.add("wrong");
    wrap.querySelectorAll(".choice-btn").forEach(b=>{
      if(b.textContent===q.choices[q.ans])b.classList.add("reveal");
    });
    state.combo=0; flash("miss");
    document.getElementById("qFeedback").textContent=`無念… 正解: ${q.choices[q.ans]}`;
    document.getElementById("qFeedback").className="q-feedback ng";
  }
  renderBattleHp(); setTimeout(()=>{state.qIdx++;showQuestion();},1800);
}

function endBattle(won){
  clearTimer(); const c=state.currentCountry;
  let bonuses=[];
  const perfect=state.correctCount===state.questions.length;
  if(won){
    if(!state.isBoss&&!state.cleared.includes(c.id)){
      state.cleared.push(c.id); bonuses.push({label:"🏯 初回制覇",val:"達成"});
    }
    if(perfect){bonuses.push({label:"🌸 完全勝利",val:"達成"});}
    if(state.isBoss){
      state.bossClears++; bonuses.push({label:"🐎 ボス撃破",val:"達成"});
    }
  }
  saveState(); showResult(won,c,bonuses,perfect);
}

function showResult(won,country,bonuses,perfect){
  showScreen("resultScreen"); const isBoss=state.isBoss;
  document.getElementById("rIcon").textContent=won?(isBoss?"🐴":(perfect?"🌸":"✅")):"💀";
  const rTitle=document.getElementById("rTitle");
  rTitle.className="result-title "+(won?(isBoss?"boss":"win"):"lose");
  rTitle.textContent=won?(isBoss?"幕府軍撃退！":(perfect?"完全平定！":"平定成功！")):"敗北…";
  document.getElementById("rSubtitle").textContent=won?`${country.name} を制圧した！`:"全問正解しなければ平定できないぞ！";

  document.getElementById("rStats").innerHTML=`
    <div class="rs-row"><span>正解数</span><span class="rs-val">${state.correctCount} / ${state.questions.length}</span></div>
    <div class="rs-row"><span>最大連撃</span><span class="rs-val">${state.combo}連続</span></div>
    ${bonuses.map(b=>`<div class="rs-row"><span>${b.label}</span><span class="rs-val gold">${b.val}</span></div>`).join("")}
    `;

  const btns=document.getElementById("rBtns"); btns.innerHTML="";
  const addBtn=(text,fn,cls="btn-primary")=>{
    const b=document.createElement("button"); b.className=`btn ${cls}`; b.textContent=text;
    b.addEventListener("click",fn); btns.appendChild(b);
  };
  if(won){
    addBtn("🗺️ 地図に戻る",openMap);
  } else {
    addBtn("🔄 もう一度挑む",()=>startBattle(country));
    addBtn("🗺️ 地図に戻る",openMap,"btn-secondary");
  }
}

function spawnDamageText(text,color){
  const el=document.createElement("div"); el.className="damage-text"; el.textContent=text;
  el.style.cssText=`color:${color};left:${40+Math.random()*20}%;top:30%;`;
  document.getElementById("battleScreen").appendChild(el);
  setTimeout(()=>el.remove(),1000);
}
function flash(type){
  const el=document.getElementById("battleFlash");
  el.className="screen-flash "+type; setTimeout(()=>el.className="screen-flash",300);
}

document.getElementById("btnStart").addEventListener("click", openMap);
document.getElementById("btnMapBack").addEventListener("click", ()=>showScreen("titleScreen"));
document.getElementById("btnBattleQuit").addEventListener("click", openMap);

loadState();
</script>
</body>
</html>
