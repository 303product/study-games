<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日本史ダイスバトル</title>
    <style>
        :root {
            --bg: #0b0b0b;
            --panel: #1a1410;
            --panel-alt: #221b16;
            --gold: #d4af37;
            --red: #b30000;
            --accent: #ff7b1a;
            --text: #f5eddc;
            --muted: #a89778;
            --border: #3c2c1c;
            --shadow: rgba(0,0,0,0.45);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: "Hiragino Mincho ProN", "Yu Mincho", "游明朝", serif;
            background: radial-gradient(circle at top, #1b120b, #050505 60%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: stretch;
        }

        #game-shell {
            width: 100%;
            max-width: 560px;
            min-height: 100vh;
            background: linear-gradient(160deg, #0d0d0d, #1b1108 70%);
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 22px 20px 30px;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.4rem;
            text-align: center;
            margin-bottom: 16px;
            color: var(--gold);
            text-shadow: 0 0 8px rgba(0,0,0,0.7);
        }

        .subtitle {
            text-align: center;
            color: var(--accent);
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #4c1b10, #7a2411);
            border: 2px solid var(--border);
            color: var(--text);
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
            cursor: pointer;
            transition: transform 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4af37, #8a6a1a);
            color: #201303;
            border-color: #9c7b21;
        }

        .btn-outline {
            background: transparent;
            border: 2px dashed var(--muted);
            color: var(--muted);
        }

        .btn-dark {
            background: linear-gradient(135deg, #0f0f0f, #1f1f1f);
        }

        .title-logo {
            font-size: 2.1rem;
            text-align: center;
            letter-spacing: 0.1em;
            margin-top: 40px;
            margin-bottom: 10px;
        }

        .note {
            font-size: 0.85rem;
            color: var(--muted);
            text-align: center;
            margin-bottom: 25px;
        }

        .era-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 14px;
            margin-top: 10px;
            flex: 1;
        }

        .era-card {
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 130px;
            position: relative;
            box-shadow: 0 6px 15px var(--shadow);
        }

        .era-card.ready {
            border-color: var(--gold);
        }

        .era-name {
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .era-note {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .era-card button {
            margin-top: 12px;
            font-size: 1rem;
            padding: 10px;
        }

        .timeline {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            border-radius: 999px;
            overflow: hidden;
        }

        .timeline span {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            font-size: 0.85rem;
            color: var(--muted);
            background: rgba(0,0,0,0.3);
        }

        .timeline span.active {
            background: linear-gradient(135deg, rgba(212,175,55,0.3), rgba(212,175,55,0.05));
            color: var(--gold);
            font-weight: bold;
        }

        .map-panel {
            flex: 1;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.35);
        }

        .map-tiles {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .tile {
            flex: 0 0 80px;
            height: 100px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--panel-alt);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            text-align: center;
            position: relative;
        }

        .tile span {
            font-size: 1.5rem;
            margin-bottom: 6px;
        }

        .tile.cleared {
            opacity: 0.5;
        }

        .tile.current {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212,175,55,0.5);
        }

        .tile.complete {
            border-style: dashed;
        }

        #player-token {
            position: absolute;
            top: -18px;
            font-size: 1.4rem;
        }

        .info-box {
            background: rgba(0,0,0,0.35);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            font-size: 0.95rem;
        }

        .info-box strong {
            color: var(--gold);
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-top: 6px;
        }

        .battle-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .battle-stats, .battle-log {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
        }

        .battle-log {
            flex: 1;
            overflow-y: auto;
            font-size: 0.9rem;
        }

        .hp-bar {
            height: 12px;
            background: #2b1c15;
            border-radius: 999px;
            overflow: hidden;
            margin-top: 4px;
        }

        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff3131, #ff9b62);
            width: 100%;
        }

        .dice-area {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .dice {
            width: 70px;
            height: 70px;
            border-radius: 16px;
            background: radial-gradient(circle, #fff -20%, #f3d493 60%, #b99034 110%);
            color: #2b1d06;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: bold;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2);
        }

        .skill-name {
            flex: 1;
            font-size: 1rem;
            color: var(--accent);
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 20;
        }

        .overlay.active {
            display: flex;
        }

        .overlay-box {
            width: 100%;
            max-width: 520px;
            background: #21150f;
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
        }

        .quiz-choices button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            font-size: 1rem;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: var(--text);
        }

        .quiz-choices button.correct {
            border-color: #38c77a;
            color: #38c77a;
        }

        .quiz-choices button.wrong {
            border-color: #ff5a5a;
            color: #ff5a5a;
        }

        .result-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 14px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .weak-list {
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .weak-item {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            background: rgba(0,0,0,0.25);
        }

        .weak-item small {
            color: var(--muted);
            display: block;
            margin-top: 4px;
        }

        .map-status {
            min-height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.95rem;
        }

        @media (max-width: 520px) {
            .screen {
                padding: 18px 14px 24px;
            }

            .map-tiles { gap: 6px; }
            .tile { flex: 0 0 74px; font-size: 0.75rem; }
            .dice { width: 60px; height: 60px; font-size: 1.9rem; }
        }
    </style>
</head>
<body>
<!-- kota/index.html にリンクを置く場合の案: <li><a href="history-dice-battle.html">日本史ダイスバトル</a></li> -->
<div id="game-shell">
    <div id="screen-title" class="screen active">
        <div class="title-logo">日本史ダイスバトル</div>
        <p class="subtitle">サイコロ＆クイズで戦国を駆け抜けよう</p>
        <button id="btn-start" class="btn">🗾 はじめる</button>
        <button id="btn-continue" class="btn btn-gold">▶ つづきから</button>
        <button id="btn-weak" class="btn btn-dark">📚 苦手帳</button>
        <button id="btn-reset" class="btn btn-outline">🗑 データをリセット</button>
        <p class="note">localStorage に進行度・苦手帳を保存します。</p>
    </div>

    <div id="screen-era" class="screen">
        <h1>時代を選ぶ</h1>
        <p class="subtitle">まずは戦国から攻略しよう！</p>
        <div class="era-list" id="era-list"></div>
        <button class="btn" id="btn-era-back">← タイトルに戻る</button>
    </div>

    <div id="screen-map" class="screen">
        <h1 id="map-stage-title">戦国マップ</h1>
        <div class="timeline" id="timeline-bar">
            <span data-era="muromachi">室町</span>
            <span data-era="sengoku">戦国</span>
            <span data-era="azuchi">安土桃山</span>
            <span data-era="edo">江戸</span>
        </div>
        <div class="info-box" id="map-context"></div>
        <div class="map-panel">
            <div class="map-tiles" id="map-tiles"></div>
            <div class="info-box" id="map-tile-info">マスを選択</div>
            <div class="status-row">
                <div>HP: <strong id="map-hp">0 / 0</strong></div>
                <div>攻撃補正: <strong id="map-bonus">+0</strong></div>
            </div>
            <div class="status-row">
                <div>正解: <strong id="map-correct">0</strong></div>
                <div>ミス: <strong id="map-wrong">0</strong></div>
            </div>
            <button class="btn btn-gold" id="map-action">決行</button>
            <div class="info-box map-status" id="map-status">マスを選んで進行しよう。</div>
        </div>
    </div>

    <div id="screen-battle" class="screen">
        <h1>戦闘</h1>
        <div class="info-box" id="battle-subtitle"></div>
        <div class="battle-wrap">
            <div class="battle-stats">
                <div><strong id="enemy-name">敵</strong></div>
                <div class="status-row">
                    <div>敵HP: <span id="enemy-hp-text">0 / 0</span></div>
                    <div>味方HP: <span id="player-hp-text">0 / 0</span></div>
                </div>
                <div class="hp-bar"><div id="enemy-hp-bar" class="hp-fill"></div></div>
                <div class="hp-bar"><div id="player-hp-bar" class="hp-fill"></div></div>
            </div>
            <div class="battle-stats">
                <div class="dice-area">
                    <div class="dice" id="battle-dice">?</div>
                    <div class="skill-name" id="skill-name">サイコロを振ろう</div>
                    <button class="btn btn-gold" id="btn-roll">🎲 サイコロ</button>
                </div>
            </div>
            <div class="battle-log" id="battle-log"></div>
            <button class="btn" id="btn-battle-leave">← マップへ戻る(敗北時)</button>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h1 id="result-title">結果</h1>
        <div class="result-card">
            <div class="stat-row"><span>正解数</span><strong id="result-correct">0</strong></div>
            <div class="stat-row"><span>間違えた数</span><strong id="result-wrong">0</strong></div>
            <div class="stat-row"><span>最大コンボ</span><strong id="result-combo">0</strong></div>
        </div>
        <div class="result-card">
            <p id="result-message"></p>
            <ul id="result-highlights"></ul>
        </div>
        <button class="btn btn-gold" id="btn-retry">↺ もう一度</button>
        <button class="btn" id="btn-result-title">← タイトルへ戻る</button>
    </div>

    <div class="overlay" id="quiz-overlay">
        <div class="overlay-box">
            <h2 id="quiz-title">クイズ</h2>
            <p id="quiz-question" style="margin-top:8px;"></p>
            <div class="quiz-choices" id="quiz-choices"></div>
            <p id="quiz-feedback" style="margin-top:12px; min-height:32px; font-size:0.95rem;"></p>
        </div>
    </div>

    <div class="overlay" id="weak-overlay">
        <div class="overlay-box">
            <h2>苦手帳</h2>
            <div class="weak-list" id="weak-list"></div>
            <button class="btn" id="btn-weak-close" style="margin-top:14px;">閉じる</button>
        </div>
    </div>

    <div class="overlay" id="message-overlay">
        <div class="overlay-box">
            <h2>歴史メモ</h2>
            <p id="message-text" style="margin-top:10px; min-height:80px;"></p>
            <button class="btn btn-gold" id="btn-message-close" style="margin-top:14px;">進む</button>
        </div>
    </div>
</div>

                { id: 'sq9', text: '伊豆を拠点として関東に勢力を広げ、のちの後北条氏の基礎を築いた人物は？', choices: ['北条早雲', '毛利元就', '島津義弘', '今川義元'], answer: 0, explain: '北条早雲は伊豆から相模へ進出し、関東支配の足場を作った。', genre: '人物' },

                { id: 'sq11', text: '南蛮貿易とキリスト教を積極的に受け入れた豊後の大名は？', choices: ['浅井長政', '朝倉義景', '大友宗麟', '真田昌幸'], answer: 2, explain: '大友宗麟はポルトガルとの貿易で銀を得て、カトリックにも改宗した。', genre: '人物' },
                { id: 'sq12', text: '織田信長が室町幕府を事実上終わらせた出来事は？', choices: ['桶狭間の戦い', '足利義昭の追放', '明智光秀の謀反', '島津征伐'], answer: 1, explain: '1573年に第15代将軍足利義昭を京都から追放し、幕府が滅んだ。', genre: '出来事' },
                { id: 'sq13', text: '石垣と天主からなる近世城郭の先駆けとなった信長の城は？', choices: ['安土城', '姫路城', '名古屋城', '熊本城'], answer: 0, explain: '琵琶湖畔に築いた安土城は豪華な天主で知られる。', genre: '文化' },
                { id: 'sq14', text: '織田信長が勢力拡大の障害とみなして焼き討ちにした寺院は？', choices: ['東大寺', '比叡山延暦寺', '金剛峯寺', '浅草寺'], answer: 1, explain: '延暦寺は武装し周辺に影響力を持っていたため、信長は徹底的に攻撃した。', genre: '出来事' },
                { id: 'sq15', text: '本能寺の変後、信長の後を継いで全国統一を進めた武将は？', choices: ['徳川家康', '豊臣秀吉', '北条氏政', '伊達政宗'], answer: 1, explain: '明智光秀を討った羽柴（豊臣）秀吉が主導権を握った。', genre: '人物' },
                { id: 'sq16', text: '刀や鉄砲を農民から没収し身分を固定しようとした政策は？', choices: ['刀狩', '廃仏毀釈', '朱印船貿易', '鎖国'], answer: 0, explain: '秀吉の刀狩令で農民の武装を禁じ、兵農分離が進んだ。', genre: '制度' }
            ]
        }
    };

    const state = {
        stageId: null,
        stage: null,
        pos: 0,
        hp: 0,
        maxHp: 0,
        powerBonus: 0,
        correct: 0,
        wrong: 0,
        combo: 0,
        maxCombo: 0,
        questionQueue: [],
        currEnemy: null,
        guardPercent: 0,
        enemyWeaken: 0,
        inBattle: false,
        pendingAdvance: false
    };

    let weakList = [];
    let messageCallback = null;
    let activeQuiz = null;

    // DOM refs
    const screens = {
        title: document.getElementById('screen-title'),
        era: document.getElementById('screen-era'),
        map: document.getElementById('screen-map'),
        battle: document.getElementById('screen-battle'),
        result: document.getElementById('screen-result')
    };

    const timelineBar = document.getElementById('timeline-bar');
    const mapTilesEl = document.getElementById('map-tiles');
    const mapContext = document.getElementById('map-context');
    const mapTileInfo = document.getElementById('map-tile-info');
    const mapActionBtn = document.getElementById('map-action');
    const mapStatus = document.getElementById('map-status');

    const battleLog = document.getElementById('battle-log');
    const battleDice = document.getElementById('battle-dice');
    const skillName = document.getElementById('skill-name');

    const quizOverlay = document.getElementById('quiz-overlay');
    const weakOverlay = document.getElementById('weak-overlay');
    const messageOverlay = document.getElementById('message-overlay');

    weakList = loadWeakList();

    renderEraList();
    updateContinueButton();

    document.getElementById('btn-start').addEventListener('click', () => {
        showScreen('era');
    });

    document.getElementById('btn-continue').addEventListener('click', () => {
        const stored = loadProgress();
        if(!stored) {
            alert('保存データがありません。');
            return;
        }
        restoreProgress(stored);
    });

    document.getElementById('btn-weak').addEventListener('click', () => {
        renderWeakList();
        weakOverlay.classList.add('active');
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
        if(confirm('進行状況と苦手帳を削除します。よろしいですか？')) {
            localStorage.removeItem(STORAGE_KEYS.PROGRESS);
            localStorage.removeItem(STORAGE_KEYS.WEAK);
            localStorage.removeItem(STORAGE_KEYS.CLEARS);
            weakList = [];
            updateContinueButton();
            alert('データをリセットしました。');
        }
    });

    document.getElementById('btn-era-back').addEventListener('click', () => showScreen('title'));
    document.getElementById('btn-weak-close').addEventListener('click', () => weakOverlay.classList.remove('active'));
    document.getElementById('btn-message-close').addEventListener('click', () => {
        messageOverlay.classList.remove('active');
        if(typeof messageCallback === 'function') {
            const cb = messageCallback;
            messageCallback = null;
            cb();
        }
    });

    mapActionBtn.addEventListener('click', () => handleTile());
    document.getElementById('btn-roll').addEventListener('click', rollBattleDice);
    document.getElementById('btn-battle-leave').addEventListener('click', () => {
        if(state.hp <= 0) {
            showResult(false);
        } else {
            alert('戦闘中は戻れません！');
        }
    });

    document.getElementById('btn-retry').addEventListener('click', () => {
        if(state.stageId) {
            startStage(state.stageId, true);
        } else {
            showScreen('title');
        }
    });

    document.getElementById('btn-result-title').addEventListener('click', () => {
        showScreen('title');
    });

    document.getElementById('btn-start').focus();

    function renderEraList() {
        const container = document.getElementById('era-list');
        container.innerHTML = '';
        ERAS.forEach(era => {
            const card = document.createElement('div');
            card.className = 'era-card' + (era.stageId ? ' ready' : '');
            card.innerHTML = `
                <div>
                    <div class="era-name">${era.name}</div>
                    <div class="era-note">${era.note}</div>
                </div>
            `;
            const btn = document.createElement('button');
            btn.className = 'btn';
            if(era.stageId) {
                btn.classList.add('btn-gold');
                btn.textContent = '進入';
                btn.addEventListener('click', () => startStage(era.stageId, true));
            } else {
                btn.textContent = '準備中';
                btn.disabled = true;
            }
            card.appendChild(btn);
            container.appendChild(card);
        });
    }

    function startStage(stageId, fresh) {
        const stage = STAGES[stageId];
        if(!stage) return;
        state.stageId = stageId;
        state.stage = stage;
        state.pos = 0;
        state.hp = stage.baseHP;
        state.maxHp = stage.baseHP;
        state.powerBonus = 0;
        state.correct = 0;
        state.wrong = 0;
        state.combo = 0;
        state.maxCombo = 0;
        state.guardPercent = 0;
        state.enemyWeaken = 0;
        state.questionQueue = shuffle(stage.questions.slice());
        state.currEnemy = null;
        showStageMessage(stage.intro, () => {
            renderMap();
            saveProgress();
        });
    }

    function restoreProgress(data) {
        const stage = STAGES[data.stageId];
        if(!stage) {
            alert('ステージデータが見つかりません。');
            return;
        }
        Object.assign(state, {
            stageId: data.stageId,
            stage,
            pos: data.pos,
            hp: data.hp,
            maxHp: data.maxHp,
            powerBonus: data.powerBonus || 0,
            correct: data.correct || 0,
            wrong: data.wrong || 0,
            combo: data.combo || 0,
            maxCombo: data.maxCombo || 0
        });
        state.guardPercent = 0;
        state.enemyWeaken = 0;
        state.questionQueue = shuffle(stage.questions.slice());
        state.currEnemy = null;
        renderMap();
    }

    function renderMap() {
        if(!state.stage) return;
        if(state.pos >= state.stage.tiles.length) {
            stageCleared();
            return;
        }
        showScreen('map');
        updateTimeline(state.stage.timelinePhase);
        document.getElementById('map-stage-title').textContent = `${state.stage.name}マップ`;
        mapContext.textContent = state.stage.summary;
        const tiles = state.stage.tiles;
        mapTilesEl.innerHTML = '';
        tiles.forEach((tile, idx) => {
            const div = document.createElement('div');
            const cleared = idx < state.pos;
            const current = idx === state.pos;
            div.className = 'tile';
            if(cleared) div.classList.add('cleared');
            if(current) div.classList.add('current');
            if(tile.type === 'boss' && cleared) div.classList.add('complete');
            div.innerHTML = `<span>${tile.icon || '⬜'}</span>${tile.label}`;
            if(current) {
                const token = document.createElement('div');
                token.id = 'player-token';
                token.textContent = '▲';
                div.appendChild(token);
            }
            mapTilesEl.appendChild(div);
        });
        const tile = tiles[state.pos];
        mapTileInfo.textContent = tile.description || actionDescription(tile.type);
        mapActionBtn.textContent = actionLabel(tile.type);
        mapActionBtn.disabled = false;
        state.pendingAdvance = false;
        mapStatus.textContent = 'マスのイベントを実行しよう。';
        document.getElementById('map-hp').textContent = `${state.hp} / ${state.maxHp}`;
        document.getElementById('map-bonus').textContent = `+${state.powerBonus}`;
        document.getElementById('map-correct').textContent = state.correct;
        document.getElementById('map-wrong').textContent = state.wrong;
    }

    function handleTile() {
        if(!state.stage) return;
        const tile = state.stage.tiles[state.pos];
        if(!tile) return;
        mapActionBtn.disabled = true;
        switch(tile.type) {
            case 'quiz':
                startMapQuiz();
                break;
            case 'battle':
                startBattle(tile.enemy || randomPick(state.stage.enemyPool), false);
                break;
            case 'heal':
                state.hp = Math.min(state.maxHp, state.hp + (tile.value || 20));
                mapStatus.textContent = `HPが${tile.value || 20}回復した！`;
                setTimeout(() => advanceTile(), 800);
                break;
            case 'boost':
                state.powerBonus += tile.value || 5;
                mapStatus.textContent = `攻撃力が+${tile.value || 5}強化された！`;
                setTimeout(() => advanceTile(), 800);
                break;
            case 'event':
                if(tile.subtype === 'bossprep') {
                    showStageMessage('軍備を整え、士気が上がった。ボス戦に備えよう。', () => {
                        mapStatus.textContent = '士気が高まった！HPが少し回復。';
                        state.hp = Math.min(state.maxHp, state.hp + 15);
                        advanceTile();
                    });
                } else {
                    advanceTile();
                }
                break;
            case 'boss':
                startBattle('boss', true);
                break;
            default:
                advanceTile();
        }
    }

    function startMapQuiz() {
        const question = drawQuestion();
        openQuiz(question, { kind: 'map' }, (result) => {
            if(result.correct) {
                mapStatus.textContent = '正解！士気が上がった。';
            } else {
                mapStatus.textContent = '不正解…先を急ごう。';
            }
            setTimeout(() => advanceTile(), 700);
        });
    }

    function advanceTile() {
        state.pos += 1;
        saveProgress();
        renderMap();
    }

    function stageCleared() {
        showStageMessage(state.stage.clearText, () => {
            recordClear(state.stageId);
            saveProgress(true);
            showResult(true);
        });
    }

    function startBattle(enemyKey, isBoss) {
        state.inBattle = true;
        let enemyData;
        if(isBoss) {
            enemyData = Object.assign({}, state.stage.boss);
        } else {
            const base = enemyKey === 'boss' ? state.stage.boss : ENEMY_LIBRARY[enemyKey];
            enemyData = Object.assign({}, base);
        }
        enemyData.currentHp = enemyData.hp;
        state.currEnemy = enemyData;
        battleLog.innerHTML = `<div>${enemyData.intro || '敵が現れた。'}</div>`;
        document.getElementById('battle-subtitle').textContent = isBoss ? '最終決戦！クイズに勝って大技を決めろ。' : 'クイズに正解して攻撃しよう。';
        battleDice.textContent = '?';
        skillName.textContent = 'サイコロを振って技を決めよう';
        document.getElementById('enemy-name').textContent = enemyData.name;
        updateBattleUI();
        showScreen('battle');
        enableRoll(true);
    }

    function rollBattleDice() {
        enableRoll(false);
        const roll = Math.floor(Math.random() * 6) + 1;
        battleDice.textContent = roll;
        const skill = SKILLS[roll];
        state.currentSkill = skill;
        skillName.textContent = `${skill.name}（${skill.text}）`;
        const question = drawQuestion();
        openQuiz(question, { kind: 'battle' }, (result) => {
            resolveBattleTurn(result.correct);
        });
    }

    function resolveBattleTurn(isCorrect) {
        const enemy = state.currEnemy;
        const skill = state.currentSkill;
        if(!enemy || !skill) return;
        const logLines = [];
        let dmg = 0;
        switch(skill.type) {
            case 'attack':
                dmg = applyDamage(skill.power, isCorrect);
                enemy.currentHp = Math.max(0, enemy.currentHp - dmg);
                logLines.push(`⚔️ ${skill.name}！${enemy.name}に${dmg}ダメージ`);
                break;
            case 'multi':
                const perHit = applyDamage(skill.power, isCorrect);
                const hits = isCorrect ? skill.hits : 1;
                dmg = perHit * hits;
                enemy.currentHp = Math.max(0, enemy.currentHp - dmg);
                logLines.push(`⚔️ ${skill.name}！${hits}回の斬撃で${dmg}ダメージ`);
                break;
            case 'heal':
                const heal = isCorrect ? skill.heal : Math.floor(skill.heal / 2);
                state.hp = Math.min(state.maxHp, state.hp + heal);
                logLines.push(`✨ ${skill.name}！HPが${heal}回復`);
                break;
            case 'guard':
                state.guardPercent = isCorrect ? skill.guard : (skill.missGuard || 0.2);
                logLines.push(`🛡️ ${skill.name}！次の被ダメージを軽減`);
                break;
            case 'special':
                dmg = applyDamage(skill.power, isCorrect);
                enemy.currentHp = Math.max(0, enemy.currentHp - dmg);
                state.enemyWeaken = isCorrect ? skill.weaken : Math.floor(skill.weaken / 2);
                logLines.push(`🎯 ${skill.name}！${dmg}ダメージ＋敵の攻撃力低下`);
                break;
            default:
                break;
        }
        battleLog.innerHTML += `<div>${logLines.join(' ')}</div>`;
        battleLog.scrollTop = battleLog.scrollHeight;
        updateBattleUI();
        if(enemy.currentHp <= 0) {
            finishBattle(true);
            return;
        }
        if(isCorrect) {
            battleLog.innerHTML += `<div style="color:var(--gold)">好機！敵の反撃を許さない。</div>`;
            battleLog.scrollTop = battleLog.scrollHeight;
            enableRoll(true);
        } else {
            enemyAttack();
        }
    }

    function applyDamage(base, isCorrect) {
        const bonus = state.powerBonus;
        let power = base + bonus;
        if(!isCorrect) power = Math.max(1, Math.floor(power / 2));
        return power;
    }

    function enemyAttack() {
        const enemy = state.currEnemy;
        if(!enemy) return;
        const range = enemy.atk || [8, 12];
        let dmg = randomRange(range[0], range[1]);
        if(state.enemyWeaken > 0) {
            dmg = Math.max(1, dmg - state.enemyWeaken);
            state.enemyWeaken = 0;
        }
        if(state.guardPercent > 0) {
            const reduced = Math.max(1, Math.floor(dmg * (1 - state.guardPercent)));
            battleLog.innerHTML += `<div>🛡️ 防御成功！${dmg}→${reduced}に軽減。</div>`;
            dmg = reduced;
            state.guardPercent = 0;
        }
        state.hp = Math.max(0, state.hp - dmg);
        battleLog.innerHTML += `<div style="color:var(--accent)">💥 ${enemy.name}の反撃！${dmg}ダメージ</div>`;
        battleLog.scrollTop = battleLog.scrollHeight;
        updateBattleUI();
        if(state.hp <= 0) {
            state.hp = 0;
            finishBattle(false);
        } else {
            enableRoll(true);
        }
    }

    function finishBattle(win) {
        enableRoll(false);
        const cleanup = () => {
            state.inBattle = false;
            state.currEnemy = null;
            state.currentSkill = null;
            state.guardPercent = 0;
            state.enemyWeaken = 0;
        };
        if(win) {
            battleLog.innerHTML += '<div style="color:var(--gold)">勝利！</div>';
            setTimeout(() => {
                cleanup();
                advanceTile();
            }, 600);
        } else {
            battleLog.innerHTML += '<div style="color:#ff6961">敗北…</div>';
            setTimeout(() => {
                cleanup();
                showResult(false);
            }, 800);
        }
    }

    function updateBattleUI() {
        if(!state.currEnemy) return;
        const enemy = state.currEnemy;
        document.getElementById('enemy-hp-text').textContent = `${enemy.currentHp} / ${enemy.hp}`;
        document.getElementById('player-hp-text').textContent = `${state.hp} / ${state.maxHp}`;
        document.getElementById('enemy-hp-bar').style.width = `${Math.max(0, (enemy.currentHp / enemy.hp) * 100)}%`;
        document.getElementById('player-hp-bar').style.width = `${Math.max(0, (state.hp / state.maxHp) * 100)}%`;
    }

    function enableRoll(flag) {
        document.getElementById('btn-roll').disabled = !flag;
    }

    function drawQuestion() {
        if(state.questionQueue.length === 0) {
            state.questionQueue = shuffle(state.stage.questions.slice());
        }
        return state.questionQueue.pop();
    }

    function openQuiz(question, meta, callback) {
        activeQuiz = { question, callback, meta, resolved: false };
        document.getElementById('quiz-title').textContent = meta && meta.kind === 'battle' ? '戦闘クイズ' : 'マスクイズ';
        document.getElementById('quiz-question').textContent = question.text;
        const choiceBox = document.getElementById('quiz-choices');
        choiceBox.innerHTML = '';
        question.choices.forEach((choice, idx) => {
            const btn = document.createElement('button');
            btn.textContent = choice;
            btn.addEventListener('click', () => submitQuiz(idx));
            choiceBox.appendChild(btn);
        });
        document.getElementById('quiz-feedback').textContent = '';
        quizOverlay.classList.add('active');
    }

    function submitQuiz(selectIdx) {
        if(!activeQuiz) return;
        if(activeQuiz.resolved) return;
        activeQuiz.resolved = true;
        const { question, callback, meta } = activeQuiz;
        const correct = question.answer === selectIdx;
        const buttons = Array.from(document.getElementById('quiz-choices').children);
        buttons.forEach((btn, idx) => {
            btn.disabled = true;
            if(idx === question.answer) btn.classList.add('correct');
            if(idx === selectIdx && !correct) btn.classList.add('wrong');
        });
        document.getElementById('quiz-feedback').textContent = `${correct ? '正解！' : '不正解…'} ${question.explain}`;
        if(meta && meta.kind === 'battle') {
            if(correct) {
                state.combo += 1;
                state.maxCombo = Math.max(state.maxCombo, state.combo);
            } else {
                state.combo = 0;
            }
        }
        if(correct) {
            state.correct += 1;
        } else {
            state.wrong += 1;
            addWeakEntry(question, selectIdx);
        }
        setTimeout(() => {
            quizOverlay.classList.remove('active');
            const cb = callback;
            activeQuiz = null;
            cb({ correct, question, selected: selectIdx });
        }, 1200);
    }

    function renderWeakList() {
        const listEl = document.getElementById('weak-list');
        if(weakList.length === 0) {
            listEl.innerHTML = '<p>まだ苦手問題はありません。</p>';
            return;
        }
        listEl.innerHTML = '';
        weakList.slice().reverse().forEach(item => {
            const div = document.createElement('div');
            div.className = 'weak-item';
            div.innerHTML = `
                <strong>Q. ${item.question}</strong>
                <small>あなたの解答: ${item.yourAnswer}</small>
                <small>正解: ${item.correctAnswer}</small>
                <p style="margin-top:6px;">${item.explain}</p>
            `;
            listEl.appendChild(div);
        });
    }

    function addWeakEntry(question, selectedIdx) {
        const entry = {
            question: question.text,
            yourAnswer: question.choices[selectedIdx] || '未回答',
            correctAnswer: question.choices[question.answer],
            explain: question.explain,
            at: Date.now()
        };
        weakList.push(entry);
        saveWeakList();
    }

    function showStageMessage(text, cb) {
        messageCallback = cb;
        document.getElementById('message-text').textContent = text;
        messageOverlay.classList.add('active');
    }

    function showResult(clear) {
        showScreen('result');
        document.getElementById('result-title').textContent = clear ? 'ステージクリア！' : 'ゲームオーバー';
        document.getElementById('result-correct').textContent = state.correct;
        document.getElementById('result-wrong').textContent = state.wrong;
        document.getElementById('result-combo').textContent = state.maxCombo;
        document.getElementById('result-message').textContent = clear ? '戦国の知識が身についた！次の時代も攻略しよう。' : '力尽きてしまった…クイズで鍛えて再挑戦しよう。';
        const list = document.getElementById('result-highlights');
        list.innerHTML = '';
        state.stage.highlights.forEach(item => {
            const li = document.createElement('li');
            li.textContent = `・${item}`;
            list.appendChild(li);
        });
        if(clear) {
            localStorage.removeItem(STORAGE_KEYS.PROGRESS);
            updateContinueButton();
        }
    }

    function updateTimeline(phase) {
        Array.from(timelineBar.children).forEach(el => {
            el.classList.toggle('active', el.dataset.era === phase);
        });
    }

    function actionLabel(type) {
        switch(type) {
            case 'quiz': return '📝 クイズに挑む';
            case 'battle': return '⚔️ 戦闘開始';
            case 'heal': return '♨️ 休息する';
            case 'boost': return '⛏️ 強化する';
            case 'event': return '📜 イベント';
            case 'boss': return '👑 ボス戦';
            default: return '進む';
        }
    }

    function actionDescription(type) {
        switch(type) {
            case 'quiz': return '歴史クイズで士気を高めよう。';
            case 'battle': return 'クイズ→技で敵を倒せ。';
            case 'heal': return '兵を休ませてHP回復。';
            case 'boost': return '兵装を整えて攻撃力アップ。';
            case 'event': return '特別イベント。';
            case 'boss': return '織田信長との最終決戦！';
            default: return '';
        }
    }

    function saveProgress(clear = false) {
        if(clear) {
            localStorage.removeItem(STORAGE_KEYS.PROGRESS);
            return;
        }
        const data = {
            stageId: state.stageId,
            pos: state.pos,
            hp: state.hp,
            maxHp: state.maxHp,
            powerBonus: state.powerBonus,
            correct: state.correct,
            wrong: state.wrong,
            combo: state.combo,
            maxCombo: state.maxCombo
        };
        localStorage.setItem(STORAGE_KEYS.PROGRESS, JSON.stringify(data));
        updateContinueButton();
    }

    function loadProgress() {
        const raw = localStorage.getItem(STORAGE_KEYS.PROGRESS);
        if(!raw) return null;
        try { return JSON.parse(raw); } catch(e) { return null; }
    }

    function updateContinueButton() {
        const btn = document.getElementById('btn-continue');
        btn.disabled = !localStorage.getItem(STORAGE_KEYS.PROGRESS);
        btn.style.opacity = btn.disabled ? 0.5 : 1;
    }

    function saveWeakList() {
        localStorage.setItem(STORAGE_KEYS.WEAK, JSON.stringify(weakList));
    }

    function loadWeakList() {
        const raw = localStorage.getItem(STORAGE_KEYS.WEAK);
        if(!raw) return [];
        try { return JSON.parse(raw); } catch(e) { return []; }
    }

    function recordClear(stageId) {
        let clears = {};
        try {
            const raw = localStorage.getItem(STORAGE_KEYS.CLEARS);
            clears = raw ? JSON.parse(raw) : {};
        } catch (e) {
            clears = {};
        }
        clears[stageId] = true;
        try {
            localStorage.setItem(STORAGE_KEYS.CLEARS, JSON.stringify(clears));
        } catch (e) {
            console.warn('clear history could not be saved', e);
        }
    }

    function showScreen(name) {
        Object.values(screens).forEach(el => el.classList.remove('active'));
        if(screens[name]) screens[name].classList.add('active');
    }

    function shuffle(arr) {
        for(let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function randomPick(list) {
        return list[Math.floor(Math.random() * list.length)];
    }

    function randomRange(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }
})();
</script>
</body>
</html>
