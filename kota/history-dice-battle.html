<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本史ダイスバトル - 全時代編</title>
    <style>
        :root {
            --primary: #c93a40; /* 緋色 */
            --secondary: #1e50a2; /* 瑠璃色 */
            --accent: #fcc800; /* 山吹色 */
            --bg-color: #f8f4e6; /* 生成り色 */
            --text-color: #333333;
            --white: #ffffff;
            --dark: #222222;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 480px;
            height: 100%;
            background: var(--white);
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            border-left: 2px solid var(--primary);
            border-right: 2px solid var(--primary);
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            padding: 20px;
            animation: fadeIn 0.3s ease-in-out;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, h2, h3 {
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary);
        }

        h1 {
            font-size: 28px;
            margin-top: 40px;
            text-shadow: 2px 2px 0px var(--accent);
        }

        .btn {
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 15px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 0;
            font-weight: bold;
            box-shadow: 0 4px 0 #93282c;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #93282c;
        }

        .btn-secondary { background: var(--secondary); box-shadow: 0 4px 0 #13346b; }
        .btn-secondary:active { transform: translateY(4px); box-shadow: 0 0 0 #13346b; }
        .btn-purple { background: #8e44ad; box-shadow: 0 4px 0 #5b2c6f; }
        .btn-purple:active { transform: translateY(4px); box-shadow: 0 0 0 #5b2c6f; }

        /* Stage Select */
        #stage-list { overflow-y: auto; flex-grow: 1; margin-bottom: 10px; }
        .stage-card {
            background: var(--white); border: 2px solid var(--primary);
            border-radius: 8px; padding: 15px; margin-bottom: 10px;
            cursor: pointer; text-align: left; transition: all 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .stage-card:active { background: #f0f0f0; transform: translateY(2px); }
        .stage-card h3 { margin: 0; color: var(--dark); font-size: 16px; text-align: left; }
        .stage-card .boss-emoji { font-size: 30px; }
        .stage-card.locked { opacity: 0.5; pointer-events: none; filter: grayscale(1); border-color: #999; }
        .stage-card.cleared { border-color: #27ae60; background: #e6f9ec; }

        /* StatusBar */
        .status-bar {
            display: flex; justify-content: space-between;
            background: var(--dark); color: var(--white);
            padding: 10px 15px; border-radius: 8px;
            margin-bottom: 20px; font-weight: bold;
        }

        /* Timeline bar */
        .timeline {
            display: flex; justify-content: space-between;
            font-size: 10px; position: relative; color: #888;
            margin-bottom: 20px; font-weight: bold;
        }
        .timeline::before {
            content: ''; position: absolute; top: 50%; left: 0; right: 0;
            height: 2px; background: #ccc; z-index: 1;
        }
        .timeline span { background: var(--white); padding: 0 2px; z-index: 2; }
        .timeline .current-era {
            color: var(--primary); font-size: 12px; text-shadow: 0 0 5px var(--accent);
        }

        /* Map */
        .map-board {
            flex-grow: 1; display: flex; flex-direction: column-reverse;
            gap: 10px; overflow-y: auto; padding-right: 10px; scroll-behavior: smooth;
        }

        .map-node {
            background: #eee; border: 2px solid #ccc; border-radius: 12px;
            padding: 15px; display: flex; align-items: center; justify-content: space-between;
            font-weight: bold; transition: all 0.3s; position: relative;
        }

        .map-node.type-start { border-color: #888; background: #ddd; }
        .map-node.type-quiz { border-color: var(--secondary); background: #e6f0ff; }
        .map-node.type-battle { border-color: var(--primary); background: #fce6e6; }
        .map-node.type-rest { border-color: #27ae60; background: #e6f9ec; }
        .map-node.type-event { border-color: var(--accent); background: #fffbe6; }
        .map-node.type-boss { border-color: #8e44ad; background: #f4e6f9; color: #8e44ad; }

        .player-icon {
            width: 30px; height: 30px; background: var(--primary); color: white;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 14px; position: absolute; left: -15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3); border: 2px solid white;
            transition: all 0.5s ease-in-out;
        }

        /* Dice Modal */
        #dice-modal, #message-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        #dice-modal.active, #message-modal.active { display: flex; }
        
        .modal-content {
            background: white; padding: 30px; border-radius: 12px;
            text-align: center; border: 4px solid var(--primary); width: 80%;
        }

        .dice-display { font-size: 64px; font-weight: bold; margin: 20px 0; color: var(--dark); }
        .dice-rolling { animation: shake 0.5s infinite; }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-15deg); }
            100% { transform: rotate(0deg); }
        }

        /* Quiz */
        .quiz-question {
            font-size: 16px; margin-bottom: 15px; line-height: 1.5;
            background: #f0f0f0; padding: 15px; border-radius: 8px; border-left: 5px solid var(--secondary);
        }
        .choices { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; overflow-y:auto; }
        .choice-btn {
            background: white; border: 2px solid var(--secondary); color: var(--dark);
            padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; text-align: left; transition: all 0.2s;
        }
        .choice-btn:active { background: #e6f0ff; }
        
        /* Battle */
        .battle-area { display: flex; flex-direction: column; align-items: center; flex-grow: 1; margin-bottom: 20px; }
        .enemy-container {
            width: 150px; height: 150px; background: var(--dark); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-radius: 10px; font-size: 20px; font-weight: bold;
            margin-bottom: 20px; border: 5px solid #8e44ad;
            box-shadow: 0 0 15px rgba(142,68,173,0.5); transition: all 0.3s;
        }
        .enemy-emoji { font-size: 60px; margin-bottom: 5px; }
        
        @keyframes shakeDamage {
            0%, 100% { transform: translateX(0); filter: drop-shadow(0 0 0 red); background: rgba(255,0,0,0.2); }
            25% { transform: translateX(-10px); filter: drop-shadow(0 0 20px red); background: rgba(255,0,0,0.5); }
            50% { transform: translateX(10px); filter: drop-shadow(0 0 20px red); background: rgba(255,0,0,0.5); }
            75% { transform: translateX(-10px); filter: drop-shadow(0 0 20px red); background: rgba(255,0,0,0.5); }
        }
        @keyframes healFlash {
            0%, 100% { filter: drop-shadow(0 0 0 green); transform: scale(1); background: transparent; }
            50% { filter: drop-shadow(0 0 20px green); transform: scale(1.02); background: rgba(0,255,0,0.2); }
        }
        .anim-damage { animation: shakeDamage 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        .anim-heal { animation: healFlash 0.5s ease-in-out both; }

        .hp-bar-bg { width: 100%; height: 20px; background: #ccc; border-radius: 10px; margin-bottom: 10px; overflow: hidden; position: relative; }
        .hp-bar-fill { height: 100%; background: #27ae60; width: 100%; transition: width 0.3s; }
        .hp-bar-fill.danger { background: var(--primary); }
        .hp-bar-text {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; justify-content: center; align-items: center;
            font-size: 12px; font-weight: bold; color: white; text-shadow: 1px 1px 2px black;
        }
        .battle-log {
            width: 100%; height: 100px; background: #f0f0f0; border-radius: 8px;
            padding: 10px; font-size: 14px; overflow-y: auto; margin-bottom: 10px; border: 1px solid #ccc;
        }

        /* Result */
        .result-stats { background: #e6f0ff; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 2px solid var(--secondary); }
        .result-stats p { font-size: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; font-weight:bold; }
    </style>
</head>
<body>

<div id="game-container">
    
    <!-- Title Screen -->
    <div id="title-screen" class="screen active">
        <h1>日本史ダイスバトル<br><small>〜全時代編〜</small></h1>
        <div style="flex-grow: 1; display: flex; align-items: center; justify-content: center;">
            <p style="text-align: center; color: #666; font-weight:bold;">サイコロを振って歴史を駆け抜けろ！<br>知識を武器に立ちはだかる偉人を倒せ。</p>
        </div>
        <button class="btn" onclick="openStageSelect()">はじめる</button>
        <button class="btn btn-secondary" onclick="continueGame()">つづきから</button>
        <button class="btn btn-purple" onclick="showMessage('お知らせ', '苦手帳は今後のアップデートで実装予定です。')">苦手帳</button>
        <button class="btn" style="background:#888; box-shadow:0 4px 0 #555;" onclick="resetSave()">データを消す</button>
    </div>

    <!-- Stage Select Screen -->
    <div id="stage-select-screen" class="screen">
        <h2>時代をえらぶ</h2>
        <div id="stage-list">
            <!-- Stage cards generated here -->
        </div>
        <button class="btn btn-secondary" onclick="changeScreen('title-screen')">タイトルへ戻る</button>
    </div>

    <!-- Map Screen -->
    <div id="map-screen" class="screen">
        <div class="status-bar">
            <span>HP: <span id="map-hp">100/100</span></span>
            <span>残りマス: <span id="map-remain">10</span></span>
        </div>
        <div class="timeline" id="map-timeline">
            <!-- Timeline inserted here -->
        </div>
        <div class="map-board" id="map-board">
            <!-- Map nodes will be generated here -->
        </div>
        <button class="btn" onclick="openDiceForMap()">サイコロを振る</button>
        <button class="btn btn-secondary" style="margin-top:5px; padding:10px;" onclick="saveAndQuit()">セーブして中断</button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="screen">
        <div class="status-bar">
            <span id="quiz-subject">クイズマス</span>
        </div>
        <div class="quiz-question" id="quiz-question"></div>
        <div class="choices" id="quiz-choices"></div>
    </div>

    <!-- Battle Screen -->
    <div id="battle-screen" class="screen">
        <div class="status-bar">
            <span>⚔️ バトル！</span>
            <span>自分のHP: <span id="battle-player-hp">100</span></span>
        </div>
        <div class="battle-area">
            <div class="enemy-container" id="enemy-sprite">
                <div class="enemy-emoji" id="enemy-emoji-disp">🥷</div>
                <div id="enemy-name-disp">忍者</div>
            </div>
            <div style="width: 100%; text-align: center; margin-bottom: 5px; font-weight: bold;">敵HP</div>
            <div class="hp-bar-bg">
                <div class="hp-bar-fill" id="enemy-hp-fill"></div>
                <div class="hp-bar-text" id="enemy-hp-text">30/30</div>
            </div>
        </div>
        <div class="battle-log" id="battle-log">戦闘開始！</div>
        <button class="btn" id="btn-battle-dice" onclick="openDiceForBattle()">サイコロを振る</button>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">
        <h1 id="result-title">クリア！</h1>
        <div class="result-stats">
            <p><span>挑戦した時代:</span> <span id="result-era">戦国</span></p>
            <p><span>正解数:</span> <span id="result-correct" style="color:var(--secondary);">0</span></p>
            <p><span>不正解数:</span> <span id="result-wrong" style="color:var(--primary);">0</span></p>
            <p><span>到達マス:</span> <span id="result-pos">0</span> / 20</p>
        </div>
        <div style="flex-grow:1; overflow-y:auto; font-size:14px; margin-bottom:20px;">
            <h3>登場した重要ワード</h3>
            <ul id="result-learned" style="padding-left:20px; line-height:1.6;"></ul>
        </div>
        <button class="btn" onclick="openStageSelect()">ステージ選択へ</button>
    </div>

    <!-- Dice Modal -->
    <div id="dice-modal">
        <div class="modal-content">
            <h2 id="dice-title">サイコロ</h2>
            <div class="dice-display" id="dice-number">🎲</div>
            <div id="dice-skill-name" style="color:var(--primary); font-weight:bold; font-size:20px; margin-bottom:15px; display:none;"></div>
            <button class="btn" id="btn-roll-dice" onclick="rollDiceAction()">ストップ！</button>
        </div>
    </div>

    <!-- Message Modal -->
    <div id="message-modal">
        <div class="modal-content">
            <h2 id="msg-title">イベント</h2>
            <p id="msg-text" style="margin:20px 0; font-size:16px; line-height:1.5;">メッセージ</p>
            <div id="msg-btn-container" style="display:flex; justify-content:center; gap:10px;">
                <button class="btn" id="msg-btn-main" onclick="closeMessageModal()">次へ</button>
            </div>
        </div>
    </div>

</div>

    function saveGame() {

            clearedStages: state.clearedStages,
            currentStageId: state.currentStageId,
            hp: state.hp, pos: state.pos, correct: state.correct, 
            wrong: state.wrong, learned: state.learned
        };
        localStorage.setItem('historyDiceState2', JSON.stringify(minimalState));
    }

    function loadGame() {
        const saved = localStorage.getItem('historyDiceState2');
        if(saved) {
            const parsed = JSON.parse(saved);
            state = { ...state, ...parsed };
            return true;
        }
        return false;
    }

    function resetSave() {

            changeScreen('map-screen');

        document.getElementById(screenId).classList.add('active');
    }

    function openStageSelect() {
        loadGame();
        const listDiv = document.getElementById('stage-list');
        listDiv.innerHTML = '';
        
        stagesData.forEach((s, idx) => {
            const isUnlocked = idx === 0 || state.clearedStages[idx - 1];
            const isCleared = state.clearedStages[idx];
            
            const card = document.createElement('div');
            card.className = `stage-card ${isUnlocked ? '' : 'locked'} ${isCleared ? 'cleared' : ''}`;
            
            const lockIcon = isUnlocked ? (isCleared ? '✅' : '▶️') : '🔒';
            card.innerHTML = `
                <div>
                    <h3>${s.name}</h3>
                    <div style="font-size:12px; color:#555; margin-top:5px;">${lockIcon} ボス: ${s.boss.name}</div>
                </div>
                <div class="boss-emoji">${s.boss.emoji}</div>
            `;
            
            if(isUnlocked) {
                card.onclick = () => startStage(idx);
            }
            listDiv.appendChild(card);
        });
        changeScreen('stage-select-screen');
    }

    function startStage(stageId) {
        state.currentStageId = stageId;
        state.hp = 100;
        state.pos = 0;
        state.correct = 0;
        state.wrong = 0;
        state.learned = [];
        
        saveGame();
        renderMap();
        updateMapUI();
        updateTimelineUI();
        changeScreen('map-screen');

    function updateTimelineUI() {
        const currentStage = stagesData[state.currentStageId];
        const tlDiv = document.getElementById('map-timeline');
        tlDiv.innerHTML = '';
        currentStage.timeline.forEach((era, idx) => {
            if (idx === Math.floor(currentStage.timeline.length / 2)) {
                tlDiv.innerHTML += `<span class="current-era">${era}</span>`;
            } else {
                tlDiv.innerHTML += `<span>${era}</span>`;
            }
        });
    }

    // --- Map Logic ---
    function renderMap() {
        const board = document.getElementById('map-board');
        board.innerHTML = '';
        
        const currentStage = stagesData[state.currentStageId];
        
        mapNodesDefault.forEach((node, idx) => {
            const el = document.createElement('div');
            el.className = `map-node type-${node.type}`;
            el.id = `node-${idx}`;
            
            let labelText = node.label;
            if (idx === 20) labelText = `ボス: ${currentStage.boss.name}`;
            
            el.innerHTML = `<span>${20 - idx}マス前</span> <span>${labelText}</span>`;
            
            if (idx === state.pos) {
                const playerIcon = document.createElement('div');
                playerIcon.className = 'player-icon';
                playerIcon.id = 'player-icon';
                playerIcon.innerHTML = '武';
                el.appendChild(playerIcon);
            }
            board.appendChild(el);
        });
    }

    function updateMapUI() {
        document.getElementById('map-hp').innerText = `${state.hp}/${state.maxHp}`;
        document.getElementById('map-remain').innerText = 20 - state.pos;
        
        const oldIcon = document.getElementById('player-icon');
        if(oldIcon) oldIcon.remove();
        
        const targetNode = document.getElementById(`node-${state.pos}`);
        if(targetNode) {
            const playerIcon = document.createElement('div');
            playerIcon.className = 'player-icon';
            playerIcon.id = 'player-icon';
            playerIcon.innerHTML = '武';
            targetNode.appendChild(playerIcon);
            
            // Auto-scroll to keep the player in view
            targetNode.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    let diceInterval;
    function showDiceModal() {
        const modal = document.getElementById('dice-modal');
        modal.classList.add('active');
        const btn = document.getElementById('btn-roll-dice');
        btn.disabled = false;
        btn.style.pointerEvents = 'auto';

        const dNum = document.getElementById('dice-number');
        dNum.classList.add('dice-rolling');
        let count = 1;
        diceInterval = setInterval(() => {
            count = count >= 6 ? 1 : count + 1;
            dNum.innerText = ['⚀','⚁','⚂','⚃','⚄','⚅'][count-1];
            if(state.diceMode === 'battle') {
                const skills = ['', '小攻撃', '防御', '連続攻撃', '回復', '特殊技', '必殺技'];
                document.getElementById('dice-skill-name').innerText = skills[count];
            }
        }, 100);
    }

    function rollDiceAction() {
        const btn = document.getElementById('btn-roll-dice');
        if (btn.disabled) return;
        btn.disabled = true;
        btn.style.pointerEvents = 'none';

        clearInterval(diceInterval);
        document.getElementById('dice-number').classList.remove('dice-rolling');
        const num = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-number').innerText = ['⚀','⚁','⚂','⚃','⚄','⚅'][num-1];
        
        setTimeout(() => {
            document.getElementById('dice-modal').classList.remove('active');
            if(state.diceMode === 'map') proceedMap(num);
            else proceedBattleDice(num);
        }, 1000);
    }

    function triggerCellEvent() {
        const cell = mapNodesDefault[state.pos];
        if(!cell) return;
        
        if(cell.type === 'quiz') {
            startQuizMode(() => {
                showMessage('正解！', 'そのまま次のターンへ進む。', () => changeScreen('map-screen'));
            }, () => {
                showMessage('不正解...', 'HPが「10」減ってしまった...', () => {
                    playAnim('game-container', 'anim-damage');
                    state.hp -= 10;
                    if(state.hp <= 0) return gameOver();
                    updateMapUI();
                    changeScreen('map-screen');
                });
            });
        } else if(cell.type === 'event' || cell.type === 'rest') {
            const heal = cell.type === 'rest' ? 30 : 10;
            state.hp = Math.min(state.maxHp, state.hp + heal);
            playAnim('game-container', 'anim-heal');
            showMessage('休憩', `体力が ${heal} 回復した！`, () => {
                updateMapUI();
                saveGame();
            });
        } else if(cell.type === 'battle') {
            const currentStage = stagesData[state.currentStageId];
            const enemy = currentStage.enemies[Math.floor(Math.random()*currentStage.enemies.length)];
            initBattle(enemy);
        } else if(cell.type === 'boss') {
            const boss = stagesData[state.currentStageId].boss;
            initBattle({ ...boss, isBoss: true });
        }
    }

        choicesDiv.innerHTML = '';
        
        let shuffledChoices = q.choices.map((choice, index) => ({ choice, originalIndex: index }));
        shuffledChoices.sort(() => Math.random() - 0.5);
        
        shuffledChoices.forEach((item, displayIdx) => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = `${displayIdx+1}. ${item.choice}`;
            btn.onclick = () => {
                document.querySelectorAll('.choice-btn').forEach(b => {
                    b.disabled = true;
                    b.style.pointerEvents = 'none';
                });
                
                const isCorrect = item.originalIndex === q.answerIndex;
                if(isCorrect) state.correct++; else state.wrong++;
                
                if(!state.learned.includes(q.category)) state.learned.push(q.category);
                
                const title = isCorrect ? '⭕ 正解！' : '❌ 不正解...';
                showMessage(title, q.explanation, () => {
                    isCorrect ? onCorrect() : onWrong();
                });
            };
            choicesDiv.appendChild(btn);
        });
    }

    // --- Battle Logic ---
    function initBattle(enemyData) {
        state.currentEnemy = { ...enemyData, hp: enemyData.hp, maxHp: enemyData.hp };
        state.battleParams = { turn: 0, defending: false };
        
        document.getElementById('enemy-emoji-disp').innerText = enemyData.emoji || '👾';
        document.getElementById('enemy-name-disp').innerText = enemyData.name;
        
        const spr = document.getElementById('enemy-sprite');
        if(enemyData.isBoss) {
            spr.style.borderColor = 'var(--primary)';
            spr.style.background = '#8e44ad';
            spr.style.boxShadow = '0 0 20px rgba(200,0,0,0.5)';
        } else {
            spr.style.borderColor = 'var(--secondary)';
            spr.style.background = 'var(--dark)';
            spr.style.boxShadow = 'none';
        }
        
        updateBattleUI();
        document.getElementById('battle-log').innerHTML = `${enemyData.name} が現れた！<br>サイコロを振って技を決めろ！`;
        changeScreen('battle-screen');
    }

    function updateBattleUI() {
        document.getElementById('battle-player-hp').innerText = state.hp;
        const enemy = state.currentEnemy;
        const hpPercent = Math.max(0, (enemy.hp / enemy.maxHp) * 100);
        const fill = document.getElementById('enemy-hp-fill');
        fill.style.width = hpPercent + '%';
        if(hpPercent <= 30) fill.classList.add('danger'); else fill.classList.remove('danger');
        document.getElementById('enemy-hp-text').innerText = `${Math.max(0, enemy.hp)}/${enemy.maxHp}`;
    }

    function logBattle(msg) {
        const log = document.getElementById('battle-log');
        log.innerHTML = msg + '<br>' + log.innerHTML;
    }

    function proceedBattleDice(diceNum) {
        const skills = [
            { id: 1, name: '小攻撃', desc: '確実な一撃', dmg: 10 },
            { id: 2, name: '防御', desc: '次の被ダメージを0にする', type: 'defend' },
            { id: 3, name: '連続攻撃', desc: '2回攻撃！', dmg: 20 },
            { id: 4, name: '回復', desc: 'HPを20回復', type: 'heal' },
            { id: 5, name: '特殊技', desc: '強烈な一撃', dmg: 30 },
            { id: 6, name: '必殺技', desc: '最大ダメージ', dmg: 45 }
        ];
        state.currentSkill = skills[diceNum-1];
        
        logBattle(`【技決定】 ${state.currentSkill.name}！ クイズに正解して発動しろ！`);
        
        setTimeout(() => {
            startQuizMode(() => executePlayerTurn(true), () => executePlayerTurn(false));
        }, 1200);
    }

    function executePlayerTurn(quizCorrect) {
        changeScreen('battle-screen');
        if(!quizCorrect) {
            logBattle(`【失敗】 クイズ不正解！ 技が発動しなかった...`);
            setTimeout(executeEnemyTurn, 1500);
            return;
        }

        const skill = state.currentSkill;
        logBattle(`【成功】 ${skill.name} 発動！`);
        
        if(skill.dmg) {
            state.currentEnemy.hp -= skill.dmg;
            logBattle(`敵に ${skill.dmg} のダメージを与えた！`);
            playAnim('enemy-sprite', 'anim-damage');
        } else if(skill.type === 'defend') {
            state.battleParams.defending = true;
            logBattle(`守りを固めた！次の敵の攻撃を防ぐ。`);
        } else if(skill.type === 'heal') {
            state.hp = Math.min(state.maxHp, state.hp + 20);
            logBattle(`HPが20回復した！`);
            playAnim('game-container', 'anim-heal');
        }
        
        updateBattleUI();
        
        if(state.currentEnemy.hp <= 0) {
            setTimeout(() => {
                showMessage('勝利！', `見事 ${state.currentEnemy.name} を倒した！`, () => {
                    if(state.currentEnemy.isBoss) {
                        gameClear();
                    } else {
                        changeScreen('map-screen');
                    }
                });
            }, 1000);
        } else {
            document.getElementById('btn-battle-dice').style.display = 'none';
            setTimeout(executeEnemyTurn, 1500);
        }
    }

    function executeEnemyTurn() {
        const enemy = state.currentEnemy;
        const eDmg = enemy.isBoss ? Math.floor(Math.random()*15) + 10 : Math.floor(Math.random()*10) + 5;
        
        logBattle(`【敵のターン】 ${enemy.name} の攻撃！`);
        
        setTimeout(() => {
            if(state.battleParams.defending) {
                logBattle(`防御成功！ ダメージを受けなかった。`);
                state.battleParams.defending = false;
            } else {
                state.hp -= eDmg;
                logBattle(`${eDmg} のダメージを受けた...`);
                playAnim('game-container', 'anim-damage');
            }
            updateBattleUI();
            
            if(state.hp <= 0) {
                setTimeout(gameOver, 1000);
            } else {
                document.getElementById('btn-battle-dice').style.display = 'block';
            }
        }, 1000);
    }

    // --- Endings & Utils ---
    function gameOver() {
        state.hp = 0;
        document.getElementById('result-title').innerText = 'ゲームオーバー...';
        document.getElementById('result-title').style.color = 'var(--dark)';
        showResult();
    }

    function gameClear() {
        document.getElementById('result-title').innerText = 'ステージクリア！';
        document.getElementById('result-title').style.color = 'var(--primary)';
        
        // Mark stage as cleared
        state.clearedStages[state.currentStageId] = true;
        saveGame();
        
        showResult();
    }

    function showResult() {
        document.getElementById('result-era').innerText = stagesData[state.currentStageId].name;
        document.getElementById('result-correct').innerText = state.correct;
        document.getElementById('result-wrong').innerText = state.wrong;
        document.getElementById('result-pos').innerText = state.pos;
        
        const learnedUl = document.getElementById('result-learned');
        learnedUl.innerHTML = '';
        state.learned.forEach(l => {
            const li = document.createElement('li');
            li.innerText = l + "について学んだ";
            learnedUl.appendChild(li);
        });
        
        changeScreen('result-screen');
    }

    function playAnim(elementId, animClass) {
        const el = document.getElementById(elementId);
        if (!el) return;
        el.classList.remove(animClass);
        void el.offsetWidth;
        el.classList.add(animClass);
        setTimeout(() => el.classList.remove(animClass), 500);
    }

    function showMessage(title, text, callback) {
        document.getElementById('msg-title').innerText = title;
        document.getElementById('msg-text').innerText = text;
        const modal = document.getElementById('message-modal');
        modal.classList.add('active');
        
        const container = document.getElementById('msg-btn-container');
        container.innerHTML = '<button class="btn" id="msg-btn-main">次へ</button>';
        const btn = document.getElementById('msg-btn-main');
        
        btn.onclick = () => {
            modal.classList.remove('active');
            if(callback) callback();
        };
    }

    function showConfirm(title, text, onYes) {
        document.getElementById('msg-title').innerText = title;
        document.getElementById('msg-text').innerText = text;
        const modal = document.getElementById('message-modal');
        modal.classList.add('active');
        
        const container = document.getElementById('msg-btn-container');
        container.innerHTML = `
            <button class="btn btn-secondary" id="msg-btn-no" style="margin-right:10px;">やめる</button>
            <button class="btn" id="msg-btn-yes">はい</button>
        `;
        
        document.getElementById('msg-btn-no').onclick = () => {
            modal.classList.remove('active');
        };
        document.getElementById('msg-btn-yes').onclick = () => {
            modal.classList.remove('active');
            if(onYes) onYes();
        };
    }
</script>
</body>
