<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>こうた ゲームメニュー</title>
  <style>
    body{
      margin:0;
      padding:20px;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
      background:linear-gradient(180deg,#8cc8ff,#f1f8ff);
      color:#12203d;
    }
    .wrap{max-width:1000px;margin:0 auto}
    .hero,.card,.note{
      background:rgba(255,255,255,.82);
      border-radius:28px;
      padding:24px;
      box-shadow:0 18px 40px rgba(0,0,0,.18);
    }
    .hero h1,.card h2{margin:0}
    .hero p,.card p{line-height:1.8;color:#35507f}
    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:18px;
      margin-top:20px;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:54px;
      padding:14px 18px;
      border-radius:18px;
      font-size:18px;
      font-weight:900;
      color:white;
      text-decoration:none;
      border:none;
      background:linear-gradient(180deg,#4f86ff,#304f9f);
      box-shadow:0 12px 24px rgba(48,79,159,.28);
      cursor:pointer;
    }
    .sub{
      background:linear-gradient(180deg,#6e7b96,#4b566f);
    }
    .links{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    @media (max-width:820px){
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>こうた ゲームメニュー</h1>
      <p>長男用の入口ページ。地理、ことわざ、算数ゲームをここから選べるようにした。</p>
    </section>

    <section class="grid">
      <article class="card">
        <h2>地理アドベンチャー</h2>
        <p>地名や位置感覚を遊びながら学ぶゲーム。</p>
        <div class="links">
          <a class="btn" href="./geo-adventure.html">このゲームであそぶ</a>
        </div>
      </article>

      <article class="card">
        <h2>ことわざゲーム</h2>
        <p>ことわざを楽しく覚えるゲーム。</p>
        <div class="links">
          <a class="btn" href="./kotowaza-game-v2.html">このゲームであそぶ</a>
        </div>
      </article>

      <article class="card">
        <h2>算数ボスバトル</h2>
        <p>計算しながらボスに挑む算数ゲーム。</p>
        <div class="links">
          <a class="btn" href="./math_boss_battle_ios.html">このゲームであそぶ</a>
        </div>
      </article>

      <article class="card">
        <h2>算数シューティング</h2>
        <p>シューティングしながら計算問題に挑戦するゲーム。</p>
        <div class="links">
          <a class="btn" href="./math_shooting_battle_v2.html">このゲームであそぶ</a>
        </div>
      </article>
    </section>

    <section class="note" style="margin-top:20px;">
      <div class="links">
        <a class="btn sub" href="../index.html">家族トップへ戻る</a>
      </div>
    </section>
  </div>
</body>
</html>
