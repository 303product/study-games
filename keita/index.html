<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>けいた ゲームメニュー</title>
  <style>
    body{
      margin:0;padding:20px;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
      background:linear-gradient(180deg,#7fd3ff,#eef8ff);
      color:#12203d;
    }
    .wrap{max-width:1000px;margin:0 auto}
    .hero,.card,.note{
      background:rgba(255,255,255,.8);
      border-radius:28px;
      padding:24px;
      box-shadow:0 18px 40px rgba(0,0,0,.18);
    }
    .hero h1,.card h2{margin:0}
    .hero p,.card p,.note{line-height:1.8;color:#35507f}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;margin-top:20px}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      min-height:54px;padding:14px 18px;border-radius:18px;
      font-size:18px;font-weight:900;color:white;text-decoration:none;border:none;
      background:linear-gradient(180deg,#4f86ff,#304f9f);
      box-shadow:0 12px 24px rgba(48,79,159,.28);cursor:pointer;
    }
    .sub{background:linear-gradient(180deg,#6e7b96,#4b566f)}
    @media (max-width:820px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>けいた ゲームメニュー</h1>
      <p>次男用の入口ページ。ここからゲームをえらんで始められるようにした。</p>
    </section>
    <section class="grid">
      <article class="card">
        <h2>ジガルデ ことばアドベンチャー</h2>
        <p>ジガルデで右へ進みながら、ひらがな・カタカナやことばを学ぶゲーム。</p>
        <a class="btn" href="./zigarde-game.html">このゲームであそぶ</a>
      </article>
      <article class="card" style="background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,230,230,0.9)); border: 2px solid #ff7676;">
        <h2>🎯 カタカナシューティングバトル</h2>
        <p>クイズにせいかいして、たまをあつめてボスをたおせ！カタカナをたのしくおぼえるよ。</p>
        <a class="btn" href="./katakana-shooting.html" style="background: linear-gradient(180deg, #ff7676, #d94444);">このゲームであそぶ</a>
      </article>
    </section>
    <div class="note" style="margin-top:20px;">
      <a class="btn sub" href="../index.html">家族トップへ戻る</a>
    </div>
  </div>
</body>
</html>
