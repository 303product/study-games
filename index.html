<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Study Games</title>
  <style>
    :root{
      --bg1:#7fd3ff;
      --bg2:#eef8ff;
      --accent:#4f86ff;
      --accent2:#304f9f;
      --shadow:0 18px 40px rgba(0,0,0,.18);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      padding:20px;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:#12203d;
    }
    .wrap{max-width:1000px;margin:0 auto}
    .hero,.card{
      background:rgba(255,255,255,.8);
      border-radius:28px;
      padding:24px;
      box-shadow:var(--shadow);
    }
    .hero h1{margin:0;font-size:40px}
    .hero p{margin:12px 0 0;line-height:1.8;color:#35507f;font-size:18px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;margin-top:20px}
    .card h2{margin:0 0 10px;font-size:30px;color:#183465}
    .card p{margin:0 0 16px;line-height:1.8;color:#35507f}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      min-height:54px;padding:14px 18px;border-radius:18px;
      font-size:18px;font-weight:900;color:white;text-decoration:none;
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      box-shadow:0 12px 24px rgba(48,79,159,.28);
    }
    @media (max-width:820px){
      .grid{grid-template-columns:1fr}
      .hero h1{font-size:32px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Study Games</h1>
      <p>家族用の入口ページ。ここから、けいた用とこうた用のメニューに分かれる。</p>
    </section>
    <section class="grid">
      <article class="card">
        <h2>けいた用</h2>
        <p>次男向け。大きめUI、やさしめゲームをここにまとめる。</p>
        <a class="btn" href="./keita/index.html">けいたメニューへ</a>
      </article>
      <article class="card">
        <h2>こうた用</h2>
        <p>長男向け。少しむずかしめのゲームをここにまとめる。</p>
        <a class="btn" href="./kota/index.html">こうたメニューへ</a>
      </article>
    </section>
  </div>
</body>
</html>
