<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>ことわざバトル道場</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d0500;
  --bg2:#1a0a00;
  --paper:#f5e6c8;
  --gold:#c9922a;
  --gold2:#f1c40f;
  --red:#c0392b;
  --red2:#e74c3c;
  --green:#1e8449;
  --green2:#27ae60;
  --blue:#1a5276;
  --blue2:#2980b9;
  --text:#f5e6c8;
  --text2:#b8a882;
}
html,body{
  width:100%;height:100%;
  background:var(--bg);
  font-family:'Noto Serif JP',serif;
  overflow:hidden;
  touch-action:manipulation;
}

/* ===== SCREENS ===== */
.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .35s ease;
}
.screen.active{opacity:1;pointer-events:all;}

/* ===== PARTICLES BG ===== */
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;}
.particle{
  position:absolute;
  width:2px;height:2px;
  border-radius:50%;
  background:var(--gold);
  opacity:0;
  animation:float linear infinite;
}
@keyframes float{
  0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
  10%{opacity:.6;}
  90%{opacity:.2;}
  100%{transform:translateY(-10vh) rotate(720deg);opacity:0;}
}

/* ===== DECORATIVE FRAME ===== */
.frame{
  position:absolute;inset:16px;
  border:2px solid rgba(201,146,42,.35);
  pointer-events:none;
  z-index:1;
}
.frame::before{
  content:'';position:absolute;inset:6px;
  border:1px solid rgba(201,146,42,.15);
}

/* ===== TITLE SCREEN ===== */
#title{background:radial-gradient(ellipse at 50% 30%, #2a1000 0%, var(--bg) 70%);}
.title-main{
  font-size:clamp(52px,8vw,88px);
  font-weight:900;
  color:var(--paper);
  text-shadow:0 0 40px rgba(201,146,42,.5),0 4px 0 #4a2000;
  letter-spacing:.08em;
  z-index:2;
  animation:titleIn .8s cubic-bezier(.22,1,.36,1) both;
}
.title-sub{
  font-size:clamp(24px,3.5vw,38px);
  color:var(--gold);
  margin-top:8px;
  z-index:2;
  animation:titleIn .8s .15s cubic-bezier(.22,1,.36,1) both;
  letter-spacing:.12em;
}
.title-tagline{
  font-size:clamp(13px,1.8vw,18px);
  color:var(--text2);
  margin-top:12px;
  z-index:2;
  animation:titleIn .8s .25s cubic-bezier(.22,1,.36,1) both;
}
@keyframes titleIn{
  from{opacity:0;transform:translateY(24px);}
  to{opacity:1;transform:translateY(0);}
}
.furigana-toggle{
  display:flex;align-items:center;gap:16px;
  margin-top:36px;z-index:2;
  animation:titleIn .8s .35s cubic-bezier(.22,1,.36,1) both;
}
.furigana-toggle span{
  font-size:18px;color:var(--text);
}
.toggle-track{
  width:72px;height:36px;
  border-radius:18px;
  background:#333;
  position:relative;cursor:pointer;
  transition:background .25s;
  border:2px solid rgba(201,146,42,.4);
}
.toggle-track.on{background:var(--green2);}
.toggle-knob{
  position:absolute;
  width:28px;height:28px;
  border-radius:50%;background:#fff;
  top:2px;left:2px;
  transition:left .25s cubic-bezier(.22,1,.36,1);
  box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.toggle-track.on .toggle-knob{left:38px;}

.start-btn{
  margin-top:32px;z-index:2;
  animation:titleIn .8s .45s cubic-bezier(.22,1,.36,1) both;
  padding:18px 64px;
  background:var(--red);
  border:3px solid var(--gold);
  border-radius:4px;
  color:#fff;
  font-family:'Noto Serif JP',serif;
  font-size:clamp(22px,3vw,32px);
  font-weight:700;
  cursor:pointer;
  transition:transform .15s,background .15s,box-shadow .15s;
  box-shadow:0 6px 20px rgba(192,57,43,.4);
  letter-spacing:.1em;
}
.start-btn:hover{
  background:var(--red2);
  transform:translateY(-2px);
  box-shadow:0 10px 28px rgba(192,57,43,.55);
}
.start-btn:active{transform:translateY(1px);}
.rules-text{
  margin-top:20px;z-index:2;
  font-size:14px;color:var(--text2);
  animation:titleIn .8s .55s cubic-bezier(.22,1,.36,1) both;
  letter-spacing:.05em;
}

/* ===== GAME SCREEN ===== */
#game{
  background:radial-gradient(ellipse at 50% 20%, #1e0800 0%, var(--bg) 65%);
  flex-direction:column;
  justify-content:flex-start;
  padding:12px 16px;
}

/* top bar */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;max-width:960px;
  margin-bottom:8px;z-index:2;
  font-size:15px;color:var(--text2);
}
.q-num{font-size:17px;color:var(--text);}
.timer{
  font-size:26px;font-weight:700;
  color:var(--paper);
  font-variant-numeric:tabular-nums;
  transition:color .3s;
}
.timer.urgent{color:var(--red2);animation:pulse .6s ease infinite alternate;}
@keyframes pulse{from{opacity:1;}to{opacity:.5;}}
.score-disp{font-size:17px;color:var(--gold);}

/* battle area */
.battle-area{
  display:flex;align-items:flex-end;justify-content:space-between;
  width:100%;max-width:960px;
  z-index:2;
  gap:12px;
}
.combatant{
  display:flex;flex-direction:column;
  align-items:center;gap:6px;
  flex:0 0 auto;
}
.combatant-name{font-size:13px;color:var(--text2);}
.hp-wrap{
  display:flex;align-items:center;gap:8px;
}
.hp-track{
  width:160px;height:16px;
  background:#222;border-radius:8px;
  border:1px solid rgba(255,255,255,.1);
  overflow:hidden;
  position:relative;
}
.hp-fill{
  height:100%;border-radius:8px;
  transition:width .35s cubic-bezier(.22,1,.36,1), background .35s;
}
.hp-num{font-size:13px;color:var(--text2);min-width:36px;}

/* SVG characters */
.char-svg{
  width:100px;height:120px;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.5));
  transition:transform .15s;
}

/* center panel */
.center-panel{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.diff-stars{font-size:18px;color:var(--gold);letter-spacing:2px;}

/* question panel */
.q-panel{
  width:100%;max-width:960px;
  background:rgba(13,5,0,.88);
  border:1px solid rgba(201,146,42,.4);
  border-radius:8px;
  padding:14px 20px 10px;
  z-index:2;
  margin-top:8px;
}
.furigana-disp{
  text-align:center;font-size:13px;
  color:var(--text2);min-height:18px;
  letter-spacing:.08em;
}
.kotowaza-disp{
  text-align:center;
  font-size:clamp(22px,4vw,34px);
  font-weight:700;color:var(--paper);
  letter-spacing:.12em;
  margin:2px 0 4px;
}
.prompt-text{
  text-align:center;font-size:13px;
  color:var(--text2);margin-bottom:4px;
}

/* choices */
.choices{
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;
  width:100%;max-width:960px;
  z-index:2;
  margin-top:8px;
}
.choice-btn{
  background:#1a0800;
  border:2px solid rgba(201,146,42,.45);
  border-radius:6px;
  padding:10px 14px;
  color:var(--paper);
  font-family:'Noto Serif JP',serif;
  font-size:clamp(13px,1.8vw,17px);
  text-align:left;
  cursor:pointer;
  transition:background .15s,border-color .15s,transform .1s;
  line-height:1.5;
  display:flex;align-items:flex-start;gap:8px;
}
.choice-btn:hover{
  background:#2e1200;
  border-color:var(--gold);
  transform:translateY(-1px);
}
.choice-btn:active{transform:translateY(1px);}
.choice-btn.correct{
  background:#0e3d1a !important;
  border-color:var(--green2) !important;
  pointer-events:none;
}
.choice-btn.wrong{
  background:#3d0e0e !important;
  border-color:var(--red2) !important;
  pointer-events:none;
}
.choice-btn.disabled{pointer-events:none;opacity:.7;}
.choice-num{
  color:var(--gold);font-weight:700;
  font-size:14px;flex-shrink:0;margin-top:1px;
}

/* feedback overlay */
.feedback{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:clamp(40px,7vw,64px);
  font-weight:900;z-index:100;
  pointer-events:none;
  opacity:0;
  text-shadow:0 0 30px currentColor,0 4px 0 rgba(0,0,0,.5);
  letter-spacing:.05em;
}

/* reibun */
.reibun-bar{
  width:100%;max-width:960px;
  font-size:13px;color:#7fb3d3;
  text-align:center;
  min-height:20px;z-index:2;
  margin-top:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ===== RESULT SCREEN ===== */
#result{background:radial-gradient(ellipse at 50% 40%,#1e0800 0%,var(--bg) 70%);}
.result-title{
  font-size:clamp(40px,7vw,68px);
  font-weight:900;
  z-index:2;
  text-shadow:0 4px 20px currentColor;
  letter-spacing:.08em;
  animation:titleIn .6s cubic-bezier(.22,1,.36,1) both;
}
.result-score{
  font-size:clamp(28px,4.5vw,48px);
  color:var(--paper);
  z-index:2;margin-top:16px;
  animation:titleIn .6s .1s cubic-bezier(.22,1,.36,1) both;
}
.result-correct{
  font-size:clamp(18px,2.8vw,26px);
  color:var(--text2);
  z-index:2;margin-top:8px;
  animation:titleIn .6s .2s cubic-bezier(.22,1,.36,1) both;
}
.result-rating{
  font-size:clamp(16px,2.2vw,22px);
  z-index:2;margin-top:12px;
  animation:titleIn .6s .3s cubic-bezier(.22,1,.36,1) both;
}
.progress-wrap{
  width:min(480px,70vw);
  height:28px;background:#222;
  border-radius:14px;
  border:1px solid rgba(201,146,42,.4);
  overflow:hidden;margin-top:20px;z-index:2;
  animation:titleIn .6s .35s cubic-bezier(.22,1,.36,1) both;
  position:relative;
}
.progress-fill{
  height:100%;border-radius:14px;
  transition:width 1s 0.5s cubic-bezier(.22,1,.36,1);
}
.progress-pct{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;color:#fff;font-weight:700;
}
.result-btns{
  display:flex;gap:20px;margin-top:32px;z-index:2;
  animation:titleIn .6s .45s cubic-bezier(.22,1,.36,1) both;
  flex-wrap:wrap;justify-content:center;
}
.res-btn{
  padding:14px 48px;
  font-family:'Noto Serif JP',serif;
  font-size:clamp(18px,2.5vw,24px);
  font-weight:700;
  border-radius:4px;
  border:2px solid var(--gold);
  cursor:pointer;
  transition:transform .15s,box-shadow .15s;
  letter-spacing:.08em;
}
.res-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.res-btn.primary{background:var(--red);color:#fff;}
.res-btn.secondary{background:var(--blue);color:#fff;}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- TITLE -->
<div class="screen active" id="title">
  <div class="frame"></div>
  <div class="title-main">ことわざ</div>
  <div class="title-sub">バトル道場</div>
  <div class="title-tagline">〜 知識で敵を倒せ！ 〜</div>
  <div class="furigana-toggle">
    <span>ふりがな</span>
    <div class="toggle-track on" id="furiganaToggle">
      <div class="toggle-knob"></div>
    </div>
  </div>
  <button class="start-btn" id="startBtn">はじめる</button>
  <div class="rules-text">10問・3分以内　正解→敵にダメージ　不正解→プレイヤーがダメージ</div>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <div class="top-bar">
    <span class="q-num" id="qNum">第1問 / 10問</span>
    <span class="timer" id="timer">3:00</span>
    <span class="score-disp" id="scoreDisp">0点</span>
  </div>

  <div class="battle-area">
    <!-- Player -->
    <div class="combatant">
      <div class="combatant-name">プレイヤー</div>
      <svg class="char-svg" id="playerSvg" viewBox="0 0 100 120">
        <!-- shadow --><ellipse cx="50" cy="112" rx="34" ry="7" fill="rgba(0,0,0,.3)"/>
        <!-- body --><rect x="28" y="58" width="44" height="52" rx="4" fill="#1a3a5c"/>
        <!-- belt --><rect x="26" y="78" width="48" height="10" rx="2" fill="#c9922a"/>
        <!-- head --><circle cx="50" cy="44" r="22" fill="#f5cba7"/>
        <!-- helmet --><rect x="24" y="24" width="52" height="22" rx="3" fill="#2c3e50"/>
        <!-- helmet top --><polygon points="50,6 80,24 20,24" fill="#2c3e50"/>
        <!-- eyes --><circle cx="40" cy="44" r="4" fill="#1a0a00"/><circle cx="60" cy="44" r="4" fill="#1a0a00"/>
        <!-- mouth --><rect x="42" y="54" width="16" height="3" rx="1" fill="#8B4513"/>
        <!-- arms --><rect x="8" y="58" width="22" height="12" rx="4" fill="#1a3a5c"/>
        <rect x="70" y="58" width="22" height="12" rx="4" fill="#1a3a5c"/>
        <!-- sword --><rect x="74" y="30" width="5" height="68" rx="2" fill="#bdc3c7"/>
        <rect x="72" y="62" width="9" height="12" rx="1" fill="#8B4513"/>
      </svg>
      <div class="hp-wrap">
        <div class="hp-track" style="width:140px">
          <div class="hp-fill" id="playerHpFill" style="width:100%;background:var(--green2)"></div>
        </div>
        <div class="hp-num" id="playerHpNum">5/5</div>
      </div>
    </div>

    <!-- Center -->
    <div class="center-panel">
      <div class="diff-stars" id="diffStars">★☆☆</div>
    </div>

    <!-- Enemy -->
    <div class="combatant">
      <div class="combatant-name">敵</div>
      <svg class="char-svg" id="enemySvg" viewBox="0 0 100 120">
        <!-- shadow --><ellipse cx="50" cy="112" rx="34" ry="7" fill="rgba(0,0,0,.3)"/>
        <!-- body --><rect x="22" y="58" width="56" height="52" rx="4" fill="#6c1e8c"/>
        <!-- horns --><polygon points="28,22 20,4 36,22" fill="#c0392b"/>
        <polygon points="72,22 64,4 80,22" fill="#c0392b"/>
        <!-- head --><circle cx="50" cy="44" r="26" fill="#8e24aa"/>
        <!-- eyes --><circle cx="38" cy="40" r="7" fill="#f39c12"/>
        <circle cx="62" cy="40" r="7" fill="#f39c12"/>
        <circle cx="38" cy="40" r="4" fill="#1a0a00"/>
        <circle cx="62" cy="40" r="4" fill="#1a0a00"/>
        <!-- angry brows --><rect x="28" y="28" width="16" height="4" rx="2" fill="#c0392b" transform="rotate(-15,36,30)"/>
        <rect x="56" y="28" width="16" height="4" rx="2" fill="#c0392b" transform="rotate(15,64,30)"/>
        <!-- mouth --><rect x="36" y="54" width="28" height="8" rx="2" fill="#1a0a00"/>
        <polygon points="42,54 46,54 44,63" fill="#fff"/>
        <polygon points="58,54 54,54 56,63" fill="#fff"/>
        <!-- arms --><rect x="2" y="58" width="22" height="12" rx="4" fill="#6c1e8c"/>
        <rect x="76" y="58" width="22" height="12" rx="4" fill="#6c1e8c"/>
        <!-- claws --><polygon points="2,66 8,78 14,66" fill="#c0392b"/>
        <polygon points="86,66 92,78 98,66" fill="#c0392b"/>
      </svg>
      <div class="hp-wrap">
        <div class="hp-track" style="width:140px">
          <div class="hp-fill" id="enemyHpFill" style="width:100%;background:var(--red2)"></div>
        </div>
        <div class="hp-num" id="enemyHpNum">10/10</div>
      </div>
    </div>
  </div>

  <!-- Question panel -->
  <div class="q-panel">
    <div class="furigana-disp" id="furiganaDisp"></div>
    <div class="kotowaza-disp" id="kotowazaDisp"></div>
    <div class="prompt-text">↓ 正しい意味はどれ？</div>
  </div>

  <!-- Choices -->
  <div class="choices" id="choices">
    <button class="choice-btn" data-i="0"><span class="choice-num">①</span><span class="choice-text"></span></button>
    <button class="choice-btn" data-i="1"><span class="choice-num">②</span><span class="choice-text"></span></button>
    <button class="choice-btn" data-i="2"><span class="choice-num">③</span><span class="choice-text"></span></button>
    <button class="choice-btn" data-i="3"><span class="choice-num">④</span><span class="choice-text"></span></button>
  </div>

  <!-- Reibun -->
  <div class="reibun-bar" id="reibunBar"></div>

  <!-- Feedback -->
  <div class="feedback" id="feedback"></div>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <div class="frame"></div>
  <div class="result-title" id="resultTitle">修行完了！</div>
  <div class="result-score" id="resultScore">スコア：0点</div>
  <div class="result-correct" id="resultCorrect">正解：0 / 10問</div>
  <div class="result-rating" id="resultRating"></div>
  <div class="progress-wrap">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
    <div class="progress-pct" id="progressPct">0%</div>
  </div>
  <div class="result-btns">
    <button class="res-btn primary" id="retryBtn">もう一度</button>
    <button class="res-btn secondary" id="titleBtn">タイトルへ</button>
  </div>
</div>

<script>
// ==================== DATA ====================
const KOTOWAZA = [
  // ===== 難易度1（やさしい）=====
  {id:1,k:"石の上にも三年",y:"いしのうえにもさんねん",i:"どんなつらいことでも、がまんして続ければ必ず成功できる",r:"練習がつらくても、石の上にも三年という気持ちで続けよう。",d:1,c:["がまんして続ければ必ず成功できる","石の上は冷たくて危険だ","三年あれば何でも覚えられる","石はとても重くて動かせない"],a:0},
  {id:2,k:"七転び八起き",y:"ななころびやおき",i:"何度失敗してもあきらめず、立ち上がり続けること",r:"七転び八起きの気持ちで、失敗をおそれずに挑戦しよう。",d:1,c:["七回転ぶと体が丈夫になる","何度失敗してもあきらめず立ち上がること","体操の技で七回転ぶこと","八回成功すれば七回失敗してもよい"],a:1},
  {id:3,k:"急がば回れ",y:"いそがばまわれ",i:"急ぐときほど、安全で確実な方法を選ぶべきだ",r:"急がば回れというから、近道より安全な道を行こう。",d:1,c:["急いでいるときは走って近道を行け","急ぐときほど安全で確実な方法を選ぶべきだ","回り道をすると時間がかかる","急いでいるときは周りをよく見よう"],a:1},
  {id:4,k:"猿も木から落ちる",y:"さるもきからおちる",i:"どんな名人や得意な人でも、失敗することがある",r:"あの先生も間違えることがある。猿も木から落ちるね。",d:1,c:["猿は木登りが得意だから絶対に落ちない","猿は気をつけないと木から落ちる","どんな名人でも失敗することがある","猿は落ちてもすぐ立ち上がれる"],a:2},
  {id:5,k:"塵も積もれば山となる",y:"ちりもつもればやまとなる",i:"小さなことでも積み重ねれば、大きな成果になる",r:"毎日少しずつ貯金しよう。塵も積もれば山となるよ。",d:1,c:["山は塵でできている","小さなことでも積み重ねれば大きな成果になる","部屋を掃除しないと山のようになる","大きな山も崩せば塵になる"],a:1},
  {id:6,k:"一石二鳥",y:"いっせきにちょう",i:"一つの行動で二つの利益を得ること",r:"散歩しながら買い物もできて、一石二鳥だ。",d:1,c:["一つの石で二羽の鳥を追いかけること","鳥を一匹捕まえるには石が二個必要","一つの行動で二つの利益を得ること","石を投げると鳥が二羽飛んでくる"],a:2},
  {id:7,k:"頭隠して尻隠さず",y:"あたまかくしてしりかくさず",i:"悪いことの一部だけを隠して、全部隠したつもりになっている",r:"言い訳がバレバレだよ。頭隠して尻隠さずだね。",d:1,c:["頭だけ隠せば見つからない","悪いことの一部だけ隠して全部隠したつもりになっている","頭と体を別々に隠すこと","かくれんぼの上手な方法"],a:1},
  {id:8,k:"犬も歩けば棒に当たる",y:"いぬもあるけばぼうにあたる",i:"行動していると、よいことも悪いことも思いがけないことが起きる",r:"外に出てみたら友達に会えた。犬も歩けば棒に当たるね。",d:1,c:["犬は外を歩くと棒で叩かれる","行動していると思いがけないことが起きる","犬は散歩が大好きだ","棒を持って歩くと危険だ"],a:1},
  {id:9,k:"三人寄れば文殊の知恵",y:"さんにんよればもんじゅのちえ",i:"普通の人でも三人集まれば、すばらしいアイデアが生まれる",r:"みんなで話し合ったら良い方法が見つかった。三人寄れば文殊の知恵だ。",d:1,c:["三人以上集まると喧嘩になる","普通の人でも三人集まればすばらしいアイデアが生まれる","文殊は三人いる神様だ","三人で勉強するとはかどる"],a:1},
  {id:10,k:"笑う門には福来たる",y:"わらうかどにはふくきたる",i:"いつも笑顔でいる家には、自然と幸せがやってくる",r:"いつも明るくしていよう。笑う門には福来たるというよ。",d:1,c:["笑いすぎると疲れる","いつも笑顔でいる家には自然と幸せがやってくる","門に福の字を書くと良いことがある","笑うと健康になる"],a:1},
  {id:11,k:"早起きは三文の得",y:"はやおきはさんもんのとく",i:"朝早く起きると、体にも生活にもよいことがある",r:"早起きして朝練したら調子がよかった。早起きは三文の得だ。",d:1,c:["朝は三時間早く起きると良い","朝早く起きると体にも生活にもよいことがある","三文は昔のお金の単位だ","早起きすると眠くなる"],a:1},
  {id:12,k:"継続は力なり",y:"けいぞくはちからなり",i:"何事も続けることで、大きな力や成果になる",r:"毎日練習を続けたら上手になった。継続は力なりだ。",d:1,c:["力があれば何でも続けられる","何事も続けることで大きな力や成果になる","続けると疲れてしまう","力持ちが続ける必要がある"],a:1},
  {id:13,k:"百聞は一見にしかず",y:"ひゃくぶんはいっけんにしかず",i:"何度聞くより、一度自分の目で見るほうがよくわかる",r:"写真で見るより実際に行ってみよう。百聞は一見にしかずだ。",d:1,c:["百回聞けば一回見るより良い","何度聞くより一度自分の目で見るほうがよくわかる","聞くことは見ることより大切だ","百枚の写真を見るとよくわかる"],a:1},
  {id:14,k:"知らぬが仏",y:"しらぬがほとけ",i:"知らないほうが、かえって心が穏やかでいられることがある",r:"そのことは知らないほうが良かったかも。知らぬが仏だ。",d:1,c:["仏様は何でも知っている","知らないほうがかえって心が穏やかでいられることがある","知らないことは恥ずかしい","仏様に聞けば何でもわかる"],a:1},
  {id:15,k:"類は友を呼ぶ",y:"るいはともをよぶ",i:"性格や考えが似ている人は、自然と集まってくる",r:"あのグループはみんな読書好きだね。類は友を呼ぶだ。",d:1,c:["友達は多ければ多いほど良い","性格や考えが似ている人は自然と集まってくる","友達を呼ぶ方法がある","似た者同士は仲が悪い"],a:1},
  {id:16,k:"案ずるより産むが易し",y:"あんずるよりうむがやすし",i:"心配するよりも実際にやってみると、案外簡単なことが多い",r:"やる前は緊張したけど、案ずるより産むが易しで、うまくいったよ。",d:1,c:["産む前から計画することが大切","心配するより実際にやってみると案外簡単なことが多い","子育ては思ったより難しい","やる前に十分考えることが必要だ"],a:1},
  {id:17,k:"終わりよければすべてよし",y:"おわりよければすべてよし",i:"最後がうまくいけば、途中がどうであれよかったといえる",r:"苦労したけど優勝できた。終わりよければすべてよしだ。",d:1,c:["終わりは始まりより大切だ","最後がうまくいけば途中がどうであれよかったといえる","すべてを終わらせることが大切","良い終わり方を決めてから始めよう"],a:1},
  {id:18,k:"論より証拠",y:"ろんよりしょうこ",i:"あれこれ議論するよりも、証拠を見せるほうが説得力がある",r:"言い合いしないで見せてあげよう。論より証拠だ。",d:1,c:["証拠より議論のほうが大切だ","あれこれ議論するより証拠を見せるほうが説得力がある","裁判では論理が一番重要だ","証拠がなければ何もできない"],a:1},
  {id:19,k:"負けるが勝ち",y:"まけるがかち",i:"時には負けておいたほうが、最終的には得になることがある",r:"ここは引いておこう。負けるが勝ちという考え方もあるよ。",d:1,c:["負けることは恥ずかしい","時には負けておいたほうが最終的には得になることがある","勝つことがすべてだ","負けてばかりでは上手くならない"],a:1},
  {id:20,k:"能ある鷹は爪を隠す",y:"のうあるたかはつめをかくす",i:"本当に実力のある人は、むやみにそれを見せびらかさない",r:"あの人はいつも静かだけど本当はすごい。能ある鷹は爪を隠すだね。",d:1,c:["鷹は爪を使わないと弱くなる","本当に実力のある人はむやみにそれを見せびらかさない","爪を隠すのは鷹の習性だ","力のある人は爪を見せるべきだ"],a:1},
  // ===== 難易度1 続き =====
  {id:21,k:"虎穴に入らずんば虎子を得ず",y:"こけつにいらずんばこじをえず",i:"危険を冒さなければ、大きな成果は得られない",r:"チャレンジしなければ成功はない。虎穴に入らずんば虎子を得ずだ。",d:1,c:["虎は穴の中に住んでいる","危険を冒さなければ大きな成果は得られない","虎の子どもは危険だ","虎の穴には近づかないほうがよい"],a:1},
  {id:22,k:"鬼に金棒",y:"おににかなぼう",i:"強い者がさらに強力な武器や助けを得ること",r:"得意な科目でさらに練習した。鬼に金棒だ。",d:1,c:["鬼は金棒が好きだ","強い者がさらに強力な武器や助けを得ること","金棒は重くて使いにくい","鬼は怖い生き物だ"],a:1},
  {id:23,k:"弘法も筆の誤り",y:"こうぼうもふでのあやまり",i:"どんな名人でも、失敗することがある",r:"プロの選手もミスをした。弘法も筆の誤りだね。",d:1,c:["弘法大師は書道が下手だった","どんな名人でも失敗することがある","筆は使い方が難しい道具だ","弘法は誤字が多かった"],a:1},
  {id:24,k:"目は口ほどに物を言う",y:"めはくちほどにものをいう",i:"目の表情は、言葉と同じくらい気持ちを伝える力がある",r:"何も言わなくても目を見ればわかる。目は口ほどに物を言うよ。",d:1,c:["目は口より大きい","目の表情は言葉と同じくらい気持ちを伝える力がある","目は口より重要な器官だ","口より目のほうがよく動く"],a:1},
  {id:25,k:"情けは人の為ならず",y:"なさけはひとのためならず",i:"人に親切にすることは、めぐりめぐって自分のためになる",r:"困っている人を助けよう。情けは人の為ならずというよ。",d:1,c:["親切にすると相手が甘えてしまう","人に親切にすることはめぐりめぐって自分のためになる","他人のことは考えないほうがよい","情けは自分だけにかけるべきだ"],a:1},
  {id:26,k:"井の中の蛙大海を知らず",y:"いのなかのかわずたいかいをしらず",i:"狭い世界だけしか知らず、広い世界があることを知らないこと",r:"もっと外の世界を見てみよう。井の中の蛙大海を知らずにならないようにね。",d:1,c:["カエルは大きな海が好きだ","狭い世界だけしか知らず広い世界があることを知らないこと","井戸の中は涼しくて快適だ","カエルは泳ぎが得意だ"],a:1},
  {id:27,k:"時は金なり",y:"ときはかねなり",i:"時間はお金と同じくらい大切で、無駄にしてはいけない",r:"ぐずぐずしないで始めよう。時は金なりというよ。",d:1,c:["金を貯めるには時間がかかる","時間はお金と同じくらい大切で無駄にしてはいけない","時計はお金で買える","時間があればお金は必要ない"],a:1},
  {id:28,k:"習うより慣れよ",y:"ならうよりなれよ",i:"教わるよりも、実際に経験を重ねるほうが身につく",r:"まずやってみよう。習うより慣れよというからね。",d:1,c:["先生に習うことが一番大切","教わるより実際に経験を重ねるほうが身につく","慣れると怠けてしまう","習うことと慣れることは同じだ"],a:1},
  {id:29,k:"好きこそ物の上手なれ",y:"すきこそもののじょうずなれ",i:"好きなことは自然と熱心になるので、上手になりやすい",r:"絵が大好きだからどんどん上手くなった。好きこそ物の上手なれだね。",d:1,c:["好きなことは上手くなれない","好きなことは自然と熱心になるので上手になりやすい","上手な人は何でも好きになる","好きすぎると飽きてしまう"],a:1},
  {id:30,k:"失敗は成功の母",y:"しっぱいはせいこうのはは",i:"失敗から学ぶことで、次の成功につながる",r:"何度失敗してもあきらめない。失敗は成功の母というよ。",d:1,c:["成功した人は失敗しない","失敗から学ぶことで次の成功につながる","失敗したら諦めることも大切","母親が失敗すると子が成功する"],a:1},
  // ===== 難易度2（ふつう）=====
  {id:31,k:"花より団子",y:"はなよりだんご",i:"見た目の美しさより、実際の役に立つもののほうがよい",r:"プレゼントは見た目よりも使えるものがいい。花より団子だね。",d:2,c:["花を見るよりも団子を食べるほうが楽しい","春はお花見よりも団子屋さんに行こう","見た目の美しさより実際に役立つもののほうがよい","花と団子はどちらも春の風物詩だ"],a:2},
  {id:32,k:"出る杭は打たれる",y:"でるくいはうたれる",i:"目立つ人や優れた人は、周りからねたまれたり批判されたりする",r:"クラスで一番目立つ子が批判された。出る杭は打たれるね。",d:2,c:["釘を打つときは出た部分を打ち込む","目立つ人や優れた人は周りから批判されやすい","杭は地面から出ていると危険だ","出た杭は雨に当たりやすい"],a:1},
  {id:33,k:"灯台下暗し",y:"とうだいもとくらし",i:"身近なことほど、かえって気づきにくいものだ",r:"ずっと探していたものが机の上にあった。灯台下暗しだ。",d:2,c:["灯台の光は足元を照らさない","暗い夜は灯台の下で休もう","身近なことほど気づきにくいものだ","灯台の近くは波が荒いので危険だ"],a:2},
  {id:34,k:"二兎を追う者は一兎をも得ず",y:"にとをおうものはいっとをもえず",i:"欲張って二つのことを同時にしようとすると、どちらも失敗する",r:"勉強もゲームも両方しようとして、どちらも中途半端になった。二兎を追う者は一兎をも得ずだ。",d:2,c:["二羽のウサギを追いかけると足が速くなる","欲張って二つのことを同時にしようとするとどちらも失敗する","ウサギを捕まえるには二人で追いかけよう","二つのことを同時にすると効率がよい"],a:1},
  {id:35,k:"備えあれば憂いなし",y:"そなえあればうれいなし",i:"前もって準備しておけば、いざというときに心配がない",r:"避難袋を用意しておこう。備えあれば憂いなしだ。",d:2,c:["心配ごとがあれば備えよう","前もって準備しておけばいざというとき心配がない","備えがあっても心配なことはある","用意周到な人は心配性だ"],a:1},
  {id:36,k:"郷に入っては郷に従え",y:"ごうにいってはごうにしたがえ",i:"その土地や集団に入ったら、そこのルールや習慣に従うべきだ",r:"転校先の学校のルールに合わせよう。郷に入っては郷に従えだ。",d:2,c:["田舎に引っ越すと不便だ","その土地や集団に入ったらそこのルールや習慣に従うべきだ","故郷が一番居心地がよい","どこへ行っても自分のやり方を通せ"],a:1},
  {id:37,k:"棚に上げる",y:"たなにあげる",i:"自分の欠点や都合の悪いことを無視して、他人を責めること",r:"自分のことは棚に上げて、人の失敗を責めるのはよくない。",d:2,c:["高い棚の上に物を置くこと","自分の欠点や都合の悪いことを無視して他人を責めること","棚を整理すること","物を高いところに保管すること"],a:1},
  {id:38,k:"身から出た錆",y:"みからでたさび",i:"自分のした悪いことが原因で、自分が苦しむこと",r:"嘘をついたことで信頼を失った。身から出た錆だ。",d:2,c:["体が錆びると病気になる","自分のした悪いことが原因で自分が苦しむこと","鉄は放置すると錆びる","錆は体に悪い"],a:1},
  {id:39,k:"焼け石に水",y:"やけいしにみず",i:"少しばかりの努力では、まったく役に立たないこと",r:"少し謝るだけでは足りない。焼け石に水だよ。",d:2,c:["熱い石に水をかけると冷める","少しばかりの努力ではまったく役に立たないこと","焼け石は水で消火できる","水は石を冷やすのに有効だ"],a:1},
  {id:40,k:"飛んで火にいる夏の虫",y:"とんでひにいるなつのむし",i:"自分から進んで危険な場所に飛び込んでいくこと",r:"罠だとわかっているのに近づくなんて、飛んで火にいる夏の虫だ。",d:2,c:["夏の虫は飛ぶのが得意だ","自分から進んで危険な場所に飛び込んでいくこと","虫は火を見ると逃げる","夏は虫が多くて大変だ"],a:1},
  {id:41,k:"他山の石",y:"たざんのいし",i:"他人の失敗や行いを、自分への教訓にすること",r:"友達の失敗を他山の石として、気をつけよう。",d:2,c:["よその山の石は使えない","他人の失敗や行いを自分への教訓にすること","他の山の石は良質だ","石は山でしか取れない"],a:1},
  {id:42,k:"触らぬ神に祟りなし",y:"さわらぬかみにたたりなし",i:"関わらなければ、面倒なことに巻き込まれずに済む",r:"その件には関わらないでおこう。触らぬ神に祟りなしだ。",d:2,c:["神様に触ると祟られる","関わらなければ面倒なことに巻き込まれずに済む","神社には触れてはいけない","祟りは神様が起こすものだ"],a:1},
  {id:43,k:"渡る世間に鬼はない",y:"わたるせけんにおにはない",i:"世の中には冷たい人ばかりでなく、親切な人もたくさんいる",r:"困っていたら見知らぬ人が助けてくれた。渡る世間に鬼はないね。",d:2,c:["世の中には鬼がいない","世の中には冷たい人ばかりでなく親切な人もたくさんいる","鬼は世界中にいる","世の中は鬼ばかりだ"],a:1},
  {id:44,k:"縁の下の力持ち",y:"えんのしたのちからもち",i:"表には出ないが、陰で人を支える大切な働きをすること",r:"マネージャーは縁の下の力持ちとして、チームを支えている。",d:2,c:["縁の下は力持ちには狭すぎる","表には出ないが陰で人を支える大切な働きをすること","力持ちは縁の下に住んでいる","縁の下は物置に使うとよい"],a:1},
  {id:45,k:"口は災いの元",y:"くちはわざわいのもと",i:"軽率な発言が、思わぬ災いを招くことがある",r:"余計なことを言って誤解された。口は災いの元だね。",d:2,c:["口は体で一番重要な器官だ","軽率な発言が思わぬ災いを招くことがある","災いは自然に起こるものだ","口を閉じると災いが来る"],a:1},
  {id:46,k:"七つの子",y:"ななつのこ",i:"七歳の子のように、愛情を持って育てること",r:"",d:2,c:["七つの子は七人の子のこと","七歳の子のように愛情を持って育てること","七は縁起の良い数字","カラスを七羽飼うこと"],a:1},
  {id:47,k:"雨降って地固まる",y:"あめふってじかたまる",i:"もめごとや困難があった後のほうが、かえって関係が良くなる",r:"喧嘩したけど仲直りして前より仲良くなった。雨降って地固まるだね。",d:2,c:["雨が降ると地面が柔らかくなる","もめごとや困難があった後のほうがかえって関係が良くなる","雨の後は泥だらけになる","地面を固めるには雨が必要だ"],a:1},
  {id:48,k:"骨折り損のくたびれ儲け",y:"ほねおりぞんのくたびれもうけ",i:"苦労した割に、何の利益も得られないこと",r:"一日中働いたのに成果がなかった。骨折り損のくたびれ儲けだ。",d:2,c:["骨折した時は休まないといけない","苦労した割に何の利益も得られないこと","くたびれると骨が折れる","儲けるためには骨を折る覚悟が必要"],a:1},
  {id:49,k:"覆水盆に返らず",y:"ふくすいぼんにかえらず",i:"一度してしまったことは、取り消しがきかないということ",r:"言ってしまった言葉は取り消せない。覆水盆に返らずだ。",d:2,c:["こぼれた水は盆に戻せる","一度してしまったことは取り消しがきかないということ","水は低いところへ流れる","盆には水を入れてはいけない"],a:1},
  {id:50,k:"医者の不養生",y:"いしゃのふようじょう",i:"人には良いことを言いながら、自分では実行しないこと",r:"健康を勧める先生が夜更かしばかり。医者の不養生だね。",d:2,c:["医者は体が弱い","人には良いことを言いながら自分では実行しないこと","医者は健康的な生活をしている","不養生だと医者になれない"],a:1},
  {id:51,k:"長所は短所",y:"ちょうしょはたんしょ",i:"長所と思われる点が、場合によっては短所にもなる",r:"慎重なのは長所だが、決断が遅くなる。長所は短所だね。",d:2,c:["長所がある人は短所もある","長所と思われる点が場合によっては短所にもなる","長所を伸ばして短所を直そう","長所と短所は別物だ"],a:1},
  {id:52,k:"紺屋の白袴",y:"こうやのしろばかま",i:"他人のことはよくするのに、自分のことはおろそかにすること",r:"美容師なのに自分の髪はボサボサだ。紺屋の白袴だね。",d:2,c:["紺屋は白い袴をはいている","他人のことはよくするのに自分のことはおろそかにすること","袴は白が正式な色だ","紺色の袴は縁起が悪い"],a:1},
  {id:53,k:"瓜の蔓には茄子はならぬ",y:"うりのつるにはなすびはならぬ",i:"親がそうであれば子もそれに似る、という意味",r:"両親が運動好きだから子どももスポーツが得意だ。瓜の蔓には茄子はならぬね。",d:2,c:["瓜と茄子は同じ植物だ","親がそうであれば子もそれに似るという意味","瓜の蔓は茄子より強い","野菜はみんな違う蔓につく"],a:1},

  {id:55,k:"腐っても鯛",y:"くさってもたい",i:"本当に価値のあるものは、少々悪くなっても値打ちがある",r:"古くなっても名作は名作。腐っても鯛というよ。",d:2,c:["腐った魚は食べてはいけない","本当に価値のあるものは少々悪くなっても値打ちがある","鯛は腐りやすい魚だ","腐った鯛は安く買える"],a:1},
  {id:56,k:"鶴の一声",y:"つるのひとこえ",i:"権威ある人のひと言が、その場の結論を決めてしまうこと",r:"会議で意見が割れていたが、社長の鶴の一声で決まった。",d:2,c:["鶴はきれいな声で鳴く","権威ある人のひと言がその場の結論を決めてしまうこと","鶴は一度しか鳴かない","声が大きい人が正しい"],a:1},
  {id:57,k:"転ばぬ先の杖",y:"ころばぬさきのつえ",i:"失敗しないように、あらかじめ準備しておくこと",r:"試合前に作戦を立てておこう。転ばぬ先の杖だ。",d:2,c:["転んだら杖を使おう","失敗しないようにあらかじめ準備しておくこと","杖は転んだ後に使う","年をとったら杖が必要になる"],a:1},
  {id:58,k:"砂上の楼閣",y:"さじょうのろうかく",i:"見た目は立派でも、基礎がしっかりしていないため崩れやすいもの",r:"計画はよさそうだが土台がない。砂上の楼閣にならないようにしよう。",d:2,c:["砂浜に建てた豪華な建物","見た目は立派でも基礎がしっかりしていないため崩れやすいもの","砂の城は子どもの遊び","楼閣は高い建物のこと"],a:1},
  {id:59,k:"嘘も方便",y:"うそもほうべん",i:"よい目的のためなら、ときには嘘をついてもよいということ",r:"驚かせるためのサプライズだから、嘘も方便だよ。",d:2,c:["嘘は絶対についてはいけない","よい目的のためならときには嘘をついてもよいということ","方便は嘘の一種だ","嘘をつくと罰が当たる"],a:1},
  {id:60,k:"人の噂も七十五日",y:"ひとのうわさもしちじゅうごにち",i:"どんな噂話も、しばらくすれば世間から忘れられる",r:"今は話題だけど、人の噂も七十五日で忘れられるよ。",d:2,c:["噂は七十五日で消える","どんな噂話もしばらくすれば世間から忘れられる","噂話は七十五回繰り返される","七十五日は三ヶ月弱だ"],a:1},

  {id:61,k:"のれんに腕押し",y:"のれんにうでおし",i:"手応えがなく、まったく効き目がないこと",r:"何度注意しても聞いてくれない。のれんに腕押しだ。",d:3,c:["のれんは腕の力で押して通るもの","暖簾をかけると腕が疲れる","手応えがなくまったく効き目がないこと","のれん分けで独立することを目指す"],a:2},
  {id:62,k:"棚から牡丹餅",y:"たなからぼたもち",i:"思いがけない幸運が転がり込んでくること",r:"抽選に当たって旅行に行けた。棚から牡丹餅だ。",d:3,c:["棚の上にある食べ物は取りにくい","思いがけない幸運が転がり込んでくること","牡丹餅は棚に保存すると長持ちする","高い棚の上は掃除が大変だ"],a:1},
  {id:63,k:"柔よく剛を制す",y:"じゅうよくごうをせいす",i:"しなやかで柔軟なものは、かたくて強いものに勝つことができる",r:"小さな会社が大企業に勝った。柔よく剛を制すだ。",d:3,c:["柔らかいものは強いものには絶対勝てない","剛力な人が柔道で強い","しなやかで柔軟なものはかたく強いものに勝てる","柔道は剛道より弱い武術だ"],a:2},

  {id:67,k:"五十歩百歩",y:"ごじっぽひゃっぽ",i:"少し違いはあっても、本質的には同じようなものだということ",r:"どちらもダメだよ。五十歩百歩だ。",d:3,c:["五十歩と百歩では大きな差がある","少し違いはあっても本質的には同じようなものだということ","五十人と百人では全然違う","歩幅によって距離が変わる"],a:1},
  {id:68,k:"漁夫の利",y:"ぎょふのり",i:"二者が争っている間に、第三者が利益をさらっていくこと",r:"二人が争っているうちに、別の人が得をした。漁夫の利だ。",d:3,c:["漁師は利益を多く得る","二者が争っている間に第三者が利益をさらっていくこと","漁業は儲かる仕事だ","利益を分け合うこと"],a:1},

  {id:71,k:"対岸の火事",y:"たいがんのかじ",i:"自分には関係のない、他人事の出来事のこと",r:"他人事と思わないで。対岸の火事ではないよ。",d:3,c:["川の向こうで起きた火事","自分には関係のない他人事の出来事のこと","対岸まで火が燃え移ること","火事は川の向こうなら安全だ"],a:1},
  {id:72,k:"因果応報",y:"いんがおうほう",i:"良い行いには良い結果が、悪い行いには悪い結果が返ってくる",r:"悪いことをしたから罰が当たった。因果応報だ。",d:3,c:["原因と結果は無関係だ","良い行いには良い結果が悪い行いには悪い結果が返ってくる","因果は仏教の言葉だ","結果がよければ手段は問わない"],a:1},
  {id:73,k:"一期一会",y:"いちごいちえ",i:"一生に一度の出会いと思って、人との縁を大切にすること",r:"この出会いを大切にしよう。一期一会の気持ちで。",d:3,c:["一回だけ会うこと","一生に一度の出会いと思って人との縁を大切にすること","一期は一年間のこと","一度会えば十分だということ"],a:1},
  {id:74,k:"以心伝心",y:"いしんでんしん",i:"言葉にしなくても、気持ちや考えが相手に伝わること",r:"言わなくても伝わったね。以心伝心だ。",d:3,c:["心から心へ電話をかけること","言葉にしなくても気持ちや考えが相手に伝わること","心の病気が伝染すること","心を込めて伝えること"],a:1},

  {id:78,k:"針小棒大",y:"しんしょうぼうだい",i:"小さなことを大げさに言うこと",r:"大した話じゃないのに針小棒大に言いすぎだよ。",d:3,c:["針と棒の大きさを比べること","小さなことを大げさに言うこと","小さな針で大きな棒を作ること","細かいことから大きな計画を立てること"],a:1},

  {id:80,k:"四面楚歌",y:"しめんそか",i:"周囲を敵に囲まれ、まったく助けがない状態のこと",r:"味方が誰もいなくて四面楚歌の状態だ。",d:3,c:["四方を歌で囲むこと","周囲を敵に囲まれまったく助けがない状態のこと","四人で楚という歌を歌うこと","四つの面に花を飾ること"],a:1},

  {id:83,k:"鳶が鷹を産む",y:"とびがたかをうむ",i:"平凡な親からすぐれた子が生まれること",r:"普通の家庭から天才が生まれた。鳶が鷹を産むね。",d:2,c:["鳶と鷹は同じ鳥だ","平凡な親からすぐれた子が生まれること","鷹は鳶より強い鳥だ","鳶が鷹の巣に卵を産むこと"],a:1},

  {id:89,k:"立て板に水",y:"たていたにみず",i:"言葉がすらすらと流れるように出てくること",r:"彼のスピーチは立て板に水のようにすらすらだった。",d:2,c:["板を立てると水が流れる","言葉がすらすらと流れるように出てくること","水は板に当たって止まる","立てた板で水を止めること"],a:1},

const TOTAL_Q = 10;
const TIME_LIMIT = 180;
const PLAYER_MAX_HP = 5;
const ENEMY_MAX_HP = 10;

// ==================== PARTICLES ====================
(function(){
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];
  function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  function mkParticle(){
    return{
      x:Math.random()*innerWidth,
      y:innerHeight+10,
      size:Math.random()*2+0.5,
      speed:Math.random()*0.6+0.2,
      opacity:0,
      maxOp:Math.random()*0.5+0.1,
    };
  }
  for(let i=0;i<40;i++){
    const p=mkParticle();
    p.y=Math.random()*innerHeight;
    particles.push(p);
  }
  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.y-=p.speed;
      if(p.y<-10){Object.assign(p,mkParticle());}
      p.opacity=Math.min(p.maxOp,(innerHeight-p.y)/innerHeight*p.maxOp*3);
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(201,146,42,${p.opacity})`;
      ctx.fill();
    });
    requestAnimationFrame(tick);
  }
  tick();
})();

// ==================== GAME STATE ====================
let state = {};
let timerInterval = null;
let furiganaOn = true;

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function fmt(s){const m=Math.floor(s/60),ss=s%60;return`${m}:${ss.toString().padStart(2,'0')}`;}
function diffStr(d){return d===1?'★☆☆':d===2?'★★☆':'★★★';}

// ==================== SCREEN SWITCH ====================
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ==================== TITLE ====================
const toggle = document.getElementById('furiganaToggle');
toggle.addEventListener('click',()=>{
  furiganaOn=!furiganaOn;
  toggle.classList.toggle('on',furiganaOn);
});
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('retryBtn').addEventListener('click',()=>showScreen('title'));
document.getElementById('titleBtn').addEventListener('click',()=>showScreen('title'));

// ==================== GAME START ====================
function startGame(){
  const questions = shuffle(KOTOWAZA).slice(0,TOTAL_Q);
  state = {
    questions,
    current:0,
    playerHp:PLAYER_MAX_HP,
    enemyHp:ENEMY_MAX_HP,
    score:0,
    correctCount:0,
    timeLeft:TIME_LIMIT,
    answering:false,
  };
  updateHpBars();
  document.getElementById('scoreDisp').textContent='0点';
  showScreen('game');
  showQuestion();
  startTimer();
}

// ==================== TIMER ====================
function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    state.timeLeft--;
    const el=document.getElementById('timer');
    el.textContent=fmt(state.timeLeft);
    el.classList.toggle('urgent',state.timeLeft<=30);
    if(state.timeLeft<=0){clearInterval(timerInterval);endGame('timeout');}
  },1000);
}

// ==================== QUESTION ====================
function showQuestion(){
  state.answering=false;
  document.getElementById('reibunBar').textContent='';

  const q=state.questions[state.current];
  document.getElementById('qNum').textContent=`第${state.current+1}問 / ${TOTAL_Q}問`;
  document.getElementById('diffStars').textContent=diffStr(q.d);
  document.getElementById('furiganaDisp').textContent=furiganaOn?q.y:'';
  document.getElementById('kotowazaDisp').textContent=q.k;

  // 選択肢をシャッフルして正解位置をランダム化
  const choiceObjs=q.c.map((text,i)=>({text,isAnswer:i===q.a}));
  const shuffledChoices=shuffle(choiceObjs);
  state.currentAnswerIdx=shuffledChoices.findIndex(o=>o.isAnswer);

  const btns=document.querySelectorAll('.choice-btn');
  btns.forEach((btn,i)=>{
    btn.className='choice-btn';
    btn.querySelector('.choice-text').textContent=shuffledChoices[i].text;
    btn.onclick=()=>onAnswer(i);
  });

  // 入場アニメ
  const panel=document.querySelector('.q-panel');
  panel.style.transition='none';panel.style.opacity='0';panel.style.transform='translateY(10px)';
  requestAnimationFrame(()=>{
    panel.style.transition='opacity .3s,transform .3s';
    panel.style.opacity='1';panel.style.transform='translateY(0)';
  });
}

// ==================== ANSWER ====================
function onAnswer(idx){
  if(state.answering)return;
  state.answering=true;

  const q=state.questions[state.current];
  const answerIdx=state.currentAnswerIdx;
  const correct=idx===answerIdx;
  const btns=document.querySelectorAll('.choice-btn');

  btns.forEach((btn,i)=>{
    btn.onclick=null;
    if(i===answerIdx) btn.classList.add('correct');
    else if(i===idx&&!correct) btn.classList.add('wrong');
    else btn.classList.add('disabled');
  });

  if(correct){
    state.correctCount++;
    state.score+=100*q.d;
    document.getElementById('scoreDisp').textContent=state.score.toLocaleString()+'点';
    showFeedback('正解！','#2ecc71');
    attackAnim(true,()=>{
      damageAnim(false);
      state.enemyHp=Math.max(0,state.enemyHp-1);
      updateHpBars();
      document.getElementById('reibunBar').textContent=`例文：「${q.r}」`;
      if(state.enemyHp<=0){setTimeout(()=>endGame('complete'),1200);}
      else{setTimeout(next,1600);}
    });
  } else {
    showFeedback('不正解…','#e74c3c');
    attackAnim(false,()=>{
      damageAnim(true);
      state.playerHp=Math.max(0,state.playerHp-1);
      updateHpBars();
      document.getElementById('reibunBar').textContent=`正解：「${q.c[q.a]}」`;
      if(state.playerHp<=0){setTimeout(()=>endGame('defeat'),1200);}
      else{setTimeout(next,1600);}
    });
  }
}

function next(){
  state.current++;
  if(state.current>=TOTAL_Q){endGame('complete');}
  else{showQuestion();}
}

// ==================== ANIMATIONS ====================
function showFeedback(msg,color){
  const el=document.getElementById('feedback');
  el.textContent=msg;el.style.color=color;el.style.opacity='1';el.style.transform='translate(-50%,-50%) scale(1)';
  setTimeout(()=>{
    el.style.transition='opacity .6s,transform .6s';
    el.style.opacity='0';el.style.transform='translate(-50%,-70%) scale(1.2)';
    setTimeout(()=>{el.style.transition='none';el.style.transform='translate(-50%,-50%) scale(1)';},600);
  },500);
}

function attackAnim(playerAttacks, cb){
  const svgId=playerAttacks?'playerSvg':'enemySvg';
  const el=document.getElementById(svgId);
  const dir=playerAttacks?1:-1;
  el.style.transition='transform .18s cubic-bezier(.22,1,.36,1)';
  el.style.transform=`translateX(${dir*40}px)`;
  setTimeout(()=>{
    el.style.transform='translateX(0)';
    cb&&cb();
  },200);
}

function damageAnim(isPlayer){
  const el=document.getElementById(isPlayer?'playerSvg':'enemySvg');
  let count=0;
  const shake=setInterval(()=>{
    el.style.transform=`translateX(${count%2===0?-8:8}px)`;
    el.style.opacity=count%2===0?'0.4':'1';
    count++;
    if(count>=6){clearInterval(shake);el.style.transform='';el.style.opacity='1';}
  },60);
}

function updateHpBars(){
  const pRatio=state.playerHp/PLAYER_MAX_HP;
  const eRatio=state.enemyHp/ENEMY_MAX_HP;
  const pColor=pRatio>0.5?'var(--green2)':pRatio>0.25?'var(--gold2)':'var(--red2)';
  const eColor=eRatio>0.5?'var(--red2)':eRatio>0.25?'var(--gold2)':'var(--green2)';

  const pFill=document.getElementById('playerHpFill');
  pFill.style.width=(pRatio*100)+'%';pFill.style.background=pColor;
  document.getElementById('playerHpNum').textContent=`${state.playerHp}/${PLAYER_MAX_HP}`;

  const eFill=document.getElementById('enemyHpFill');
  eFill.style.width=(eRatio*100)+'%';eFill.style.background=eColor;
  document.getElementById('enemyHpNum').textContent=`${state.enemyHp}/${ENEMY_MAX_HP}`;
}

// ==================== END GAME ====================
function endGame(reason){
  clearInterval(timerInterval);
  const {score,correctCount,timeLeft}=state;
  const victory=reason==='complete';

  const title=document.getElementById('resultTitle');
  if(reason==='defeat'){title.textContent='敗北…修行が足りぬ';title.style.color='#e74c3c';}
  else if(reason==='timeout'){title.textContent='時間切れ！';title.style.color='#e67e22';}
  else{title.textContent='修行完了！';title.style.color='#f39c12';}

  document.getElementById('resultScore').textContent=`スコア：${score.toLocaleString()}点`;
  document.getElementById('resultCorrect').textContent=`正解：${correctCount} / ${TOTAL_Q}問`;

  const ratio=correctCount/TOTAL_Q;
  const ratingEl=document.getElementById('resultRating');
  if(ratio===1){ratingEl.textContent='満点！ ことわざ名人じゃ！';ratingEl.style.color='#f1c40f';}
  else if(ratio>=.8){ratingEl.textContent='優秀！ かなりの使い手じゃ';ratingEl.style.color='#f39c12';}
  else if(ratio>=.6){ratingEl.textContent='合格！ 修行の成果が出ておる';ratingEl.style.color='#2ecc71';}
  else if(ratio>=.4){ratingEl.textContent='まだまだじゃ。修行あるのみ！';ratingEl.style.color='#e67e22';}
  else{ratingEl.textContent='精進が足りぬ。もっと学べ！';ratingEl.style.color='#e74c3c';}

  const pct=Math.round(ratio*100);
  const fill=document.getElementById('progressFill');
  const pctEl=document.getElementById('progressPct');
  fill.style.background=ratio>=.6?'var(--green2)':'var(--red2)';
  fill.style.width='0%';pctEl.textContent='0%';
  showScreen('result');
  setTimeout(()=>{fill.style.width=pct+'%';pctEl.textContent=pct+'%';},100);
}
</script>
</body>
